<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>00o.uz o'rnatish — PWA</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#0a0e1a 0%,#1a1a2e 100%);color:#f1f5f9;min-height:100vh;padding:60px 16px 40px;max-width:520px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.icon{width:120px;height:120px;border-radius:28px;background:linear-gradient(135deg,#8b5cf6,#ec4899);display:flex;align-items:center;justify-content:center;font-size:64px;margin:0 auto 20px;box-shadow:0 20px 60px rgba(139,92,246,0.5)}
h1{font-size:clamp(28px,7vw,36px);font-weight:800;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.tag{font-size:15px;color:#cbd5e1;margin-bottom:24px;line-height:1.5}
.steps{width:100%;text-align:left;margin-bottom:24px}
.step{padding:14px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.step-n{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:800;display:flex;align-items:center;justify-content:center}
.step-t{font-size:14px;color:#e2e8f0;line-height:1.4}
.step-t b{color:#fbbf24}
.btn{padding:14px 24px;border-radius:100px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;font-size:16px;margin:6px;box-shadow:0 8px 24px rgba(139,92,246,0.4)}
.btn:active{transform:scale(0.97)}
.btn.s{background:rgba(255,255,255,0.05);box-shadow:none;border:1px solid rgba(255,255,255,0.1)}
.features{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-top:16px}
.feat{padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;font-size:12px;color:#cbd5e1}
.feat-i{font-size:24px;margin-bottom:4px}
</style>
</head>
<body>
<div class="icon">🚀</div>
<h1>00o.uz ni o'rnating</h1>
<p class="tag">Tezkor, qulay, internet o'chsa ham ishlaydi</p>
<div class="steps" id="steps">
  <div class="step"><div class="step-n">1</div><div class="step-t"><b>Brauzer menyusi</b>ni oching (⋮ yoki Share tugmasi)</div></div>
  <div class="step"><div class="step-n">2</div><div class="step-t"><b>"Bosh ekranga qo'shish"</b> yoki <b>"Add to Home Screen"</b> ni bosing</div></div>
  <div class="step"><div class="step-n">3</div><div class="step-t"><b>"O'rnatish"</b> ni tasdiqlang. Tayyor! 🎉</div></div>
</div>
<button class="btn" id="installBtn" style="display:none">📲 O'rnatish</button>
<a href="/" class="btn s">← Bosh sahifa</a>
<div class="features">
  <div class="feat"><div class="feat-i">⚡</div>Tezkor</div>
  <div class="feat"><div class="feat-i">📡</div>Offline</div>
  <div class="feat"><div class="feat-i">📱</div>Mobil</div>
  <div class="feat"><div class="feat-i">🆓</div>Bepul</div>
</div>
<script>
let deferred;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferred = e; document.getElementById('installBtn').style.display='inline-block'; });
document.getElementById('installBtn').addEventListener('click', async () => { if (deferred) { deferred.prompt(); const {outcome} = await deferred.userChoice; if (outcome==='accepted') toast.success('O\'rnatildi!'); deferred = null; } });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>

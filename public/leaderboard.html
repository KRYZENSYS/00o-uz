<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — 00o.uz</title>
<link rel="manifest" href="/manifest.json">
<script src="/toast.js"></script>
<script src="/confetti.js"></script>
<script src="/animations.js"></script>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 0 24px; }
nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,14,26,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; padding: 16px 0; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #fbbf24, #f59e0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.hero { padding: 100px 0 20px; text-align: center; }
.hero h1 { font-size: 40px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b, #ef4444);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tabs { display: flex; gap: 4px; padding: 4px; background: rgba(255,255,255,0.05);
  border-radius: 12px; width: fit-content; margin: 20px auto 30px; }
.tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
.tab.active { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
.podium { display: flex; justify-content: center; align-items: flex-end; gap: 12px; margin: 30px 0; }
.pod { text-align: center; padding: 16px; border-radius: 16px; min-width: 120px; }
.pod-1 { order: 2; background: linear-gradient(135deg, #fbbf24, #f59e0b); height: 220px; transform: scale(1.1); }
.pod-2 { order: 1; background: linear-gradient(135deg, #94a3b8, #64748b); height: 180px; }
.pod-3 { order: 3; background: linear-gradient(135deg, #d97706, #92400e); height: 160px; }
.pod-emoji { font-size: 50px; margin: 8px 0; }
.pod-name { font-weight: 800; font-size: 14px; }
.pod-xp { font-size: 12px; opacity: 0.9; }
.list { display: flex; flex-direction: column; gap: 8px; }
.row { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.06); transition: 0.2s; }
.row:hover { transform: translateX(4px); border-color: rgba(251,191,36,0.3); }
.rank { font-size: 18px; font-weight: 800; color: #94a3b8; min-width: 30px; }
.rank.top { color: #fbbf24; }
.av { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  display: flex; align-items: center; justify-content: center; font-size: 18px; }
.info { flex: 1; }
.name { font-weight: 700; }
.level { font-size: 12px; color: #94a3b8; }
.xp { font-weight: 800; color: #fbbf24; }
</style>
</head>
<body>
<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">🏆 00o.uz</a>
    <div style="display:flex;gap:8px"><a href="profile.html" style="padding:8px 14px;background:rgba(255,255,255,0.05);border-radius:8px;text-decoration:none;color:white">👤</a></div>
  </div>
</nav>
<section class="hero container">
  <h1>🏆 Top Foydalanuvchilar</h1>
  <p style="color:#94a3b8">Eng faol va muvaffaqiyatli a'zolar</p>
  <div class="tabs">
    <div class="tab active" onclick="setTab(this, 'xp')">⭐ XP</div>
    <div class="tab" onclick="setTab(this, 'startups')">🚀 Startaplar</div>
    <div class="tab" onclick="setTab(this, 'coins')">💰 Tanga</div>
    <div class="tab" onclick="setTab(this, 'streak')">🔥 Streak</div>
  </div>
</section>
<section class="container">
  <div class="podium">
    <div class="pod pod-2 oo-anim fade-up"><div class="pod-emoji">👩‍💼</div><div class="pod-name">Nilufar</div><div class="pod-xp">11,200 XP</div></div>
    <div class="pod pod-1 oo-anim fade-up" style="animation-delay:0.1s"><div class="pod-emoji">👨‍💻</div><div class="pod-name">Firdavs</div><div class="pod-xp">12,480 XP</div><div>👑</div></div>
    <div class="pod pod-3 oo-anim fade-up" style="animation-delay:0.2s"><div class="pod-emoji">👨‍🚀</div><div class="pod-name">Jasur</div><div class="pod-xp">10,580 XP</div></div>
  </div>
  <div class="list" id="list"></div>
</section>
<script>
const users = [
  {n:'Aziz', e:'👨‍💻', xp:9850, lvl:42},
  {n:'Madina', e:'👩‍🎨', xp:9120, lvl:40},
  {n:'Bobur', e:'👨‍💼', xp:8780, lvl:38},
  {n:'Saida', e:'👩‍🎬', xp:7650, lvl:35},
  {n:'Ulug\'bek', e:'👨‍🔬', xp:6420, lvl:32},
  {n:'Zuhra', e:'👩‍⚕️', xp:5890, lvl:30},
  {n:'Sardor', e:'👨‍🎓', xp:4560, lvl:25},
  {n:'Dilfuza', e:'👩‍🏫', xp:3980, lvl:22},
];
function setTab(el, t) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
}
function render() {
  document.getElementById('list').innerHTML = users.map((u, i) => `
    <div class="row oo-anim fade-up" style="animation-delay:${i*0.04}s">
      <div class="rank ${i<3?'top':''}">${i+4}</div>
      <div class="av">${u.e}</div>
      <div class="info"><div class="name">${u.n}</div><div class="level">Level ${u.lvl}</div></div>
      <div class="xp">${u.xp.toLocaleString()} XP</div>
    </div>
  `).join('');
}
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Pass — 00o.uz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,14,26,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; padding: 16px 0; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.nav-links { display: flex; gap: 8px; list-style: none; }
.nav-links a { color: #cbd5e1; text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 8px; }
.nav-links a:hover { background: rgba(255,255,255,0.05); }
.nav-links a.active { background: linear-gradient(135deg, #ef4444, #fbbf24); }
.btn-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; }
.bp-hero { padding: 100px 0 20px; text-align: center; }
.bp-hero h1 { font-size: 40px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #ef4444, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.season { color: #94a3b8; }
.bp-info { display: flex; justify-content: space-between; align-items: center; margin: 24px 0;
  padding: 20px; border-radius: 16px;
  background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(251,191,36,0.05));
  border: 1px solid rgba(239,68,68,0.3); }
.bp-progress { flex: 1; margin: 0 20px; }
.bp-bar { height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; margin-top: 8px; }
.bp-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #fbbf24, #22c55e); border-radius: 6px;
  background-size: 200% 100%; animation: bpShine 2s linear infinite; }
@keyframes bpShine { to { background-position: 200% 0; } }
.levels { display: flex; gap: 8px; overflow-x: auto; padding: 20px 0 40px; }
.level { flex-shrink: 0; width: 140px; padding: 16px; border-radius: 14px; text-align: center;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.06); position: relative; transition: 0.3s; }
.level.completed { background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(34,197,94,0.05));
  border-color: rgba(34,197,94,0.4); }
.level.current { background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(239,68,68,0.05));
  border-color: rgba(251,191,36,0.4); transform: scale(1.05); }
.level-num { font-size: 12px; color: #94a3b8; }
.level-reward { font-size: 32px; margin: 6px 0; }
.level-xp { font-size: 10px; color: #94a3b8; }
</style>
</head>
<body>
<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">00o.uz</a>
    <ul class="nav-links">
      <li><a href="index.html">Bosh</a></li>
      <li><a href="leaderboard.html">🏆 Top</a></li>
      <li><a href="shop.html">🛍 Shop</a></li>
      <li><a href="spin-wheel.html">🎰</a></li>
      <li><a href="battle-pass.html" class="active">⚔ Pass</a></li>
    </ul>
    <div style="display:flex;gap:8px;">
      <button class="btn-icon">🔔</button>
      <a href="profile.html" class="btn-icon">👤</a>
    </div>
  </div>
</nav>
<section class="bp-hero container">
  <h1>⚔️ Battle Pass</h1>
  <p class="season">Sezon 1 · "Cosmic Voyage" · 47/100</p>
</section>
<section class="container">
  <div class="bp-info">
    <div>
      <div style="font-weight:800;font-size:20px">Level 47</div>
      <div style="color:#94a3b8;font-size:12px">Keyingi: Level 48</div>
    </div>
    <div class="bp-progress">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8">
        <span>5,580 XP</span><span>9,000 XP</span>
      </div>
      <div class="bp-bar"><div class="bp-fill" style="width:62%"></div></div>
    </div>
    <button style="padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#ef4444,#fbbf24);
      border:none;color:white;font-weight:700;cursor:pointer" onclick="claim()">🎁 Claim</button>
  </div>
  <h2 style="margin:20px 0 12px">📈 Yo'lak</h2>
  <div class="levels" id="levels"></div>
</section>
<script src="/toast.js"></script>
<script src="/confetti.js"></script>
<script src="/animations.js"></script>
<script src="/sound-effects.js"></script>
<script>
const rewards = ['💎','💰','⭐','🎁','🏆','🚀','👑','🔥','💫','🌟','🎖','🦄','🎭','🎨','⚡'];
function render() {
  const wrap = document.getElementById('levels');
  wrap.innerHTML = '';
  for (let i = 1; i <= 30; i++) {
    const lvl = document.createElement('div');
    let cls = '';
    if (i < 12) cls = 'completed';
    else if (i === 12) cls = 'current';
    lvl.className = 'level oo-anim fade-up ' + cls;
    lvl.style.animationDelay = (i*0.04) + 's';
    lvl.innerHTML = `<div class="level-num">Lvl ${i}</div><div class="level-reward">${rewards[i%rewards.length]}</div><div class="level-xp">${i*200} XP</div>`;
    lvl.onclick = () => {
      if (i <= 12) window.toast?.success(`Level ${i} mukofoti olindi!`, '🎁');
      else window.toast?.info(`Level ${i} ga yetmadingiz`, '🔒');
    };
    wrap.appendChild(lvl);
  }
}
function claim() {
  window.confetti({count:100, x: window.innerWidth/2, y: 300});
  window.sfx?.achievement();
  window.toast?.achievement('Mukofot olindi! 500 tanga + 200 XP', '🎁 Battle Pass');
}
render();
</script>
</body>
</html>

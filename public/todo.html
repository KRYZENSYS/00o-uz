<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Todo — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:720px;margin:0 auto}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;margin-bottom:6px;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.bar{padding:14px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
.row{display:flex;gap:8px;align-items:center}
input{flex:1;padding:12px 14px;border-radius:10px;background:rgba(0,0,0,0.4);color:white;border:1px solid rgba(255,255,255,0.1);font-size:16px}
input:focus{outline:none;border-color:#8b5cf6}
button{padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;font-size:15px}
button:active{transform:scale(0.97)}
.list-item{padding:12px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;margin-bottom:6px}
.chk{width:24px;height:24px;border-radius:6px;border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px}
.done .chk{background:#22c55e;border-color:#22c55e;color:white}
.done .txt{text-decoration:line-through;opacity:0.5}
.txt{flex:1;word-break:break-word}
.del{background:rgba(239,68,68,0.2);color:#fca5a5;width:32px;height:32px;border-radius:8px;border:none;font-size:14px;cursor:pointer}
.stats{display:flex;gap:8px;margin-bottom:12px}
.s{flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.03);text-align:center}
.s-n{font-size:20px;font-weight:800;color:#8b5cf6}
.s-l{font-size:11px;color:#94a3b8}
.empty{text-align:center;color:#64748b;padding:30px;font-size:14px}
.tabs{display:flex;gap:4px;margin-bottom:12px;background:rgba(255,255,255,0.03);padding:4px;border-radius:10px}
.tab{flex:1;padding:8px;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;color:#94a3b8}
.tab.act{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:700}
</style>
</head>
<body>
<h1>✅ Todo</h1>
<p class="sub">Vazifalaringizni boshqaring</p>
<div class="stats">
  <div class="s"><div class="s-n" id="total">0</div><div class="s-l">Jami</div></div>
  <div class="s"><div class="s-n" id="done">0</div><div class="s-l">Bajarilgan</div></div>
  <div class="s"><div class="s-n" id="left">0</div><div class="s-l">Qolgan</div></div>
</div>
<div class="bar">
  <div class="row">
    <input id="in" placeholder="Yangi vazifa..." maxlength="200">
    <button onclick="add()">+</button>
  </div>
</div>
<div class="tabs">
  <div class="tab act" onclick="setF('all',this)">Hammasi</div>
  <div class="tab" onclick="setF('active',this)">Faol</div>
  <div class="tab" onclick="setF('done',this)">Tayyor</div>
</div>
<div id="list"></div>
<script>
var list = oo.load('todo', []);
var filter = 'all';
function save(){ oo.save('todo', list); }
function render(){
  var f = list;
  if (filter==='active') f = list.filter(function(t){return !t.d});
  if (filter==='done') f = list.filter(function(t){return t.d});
  var html = f.length ? f.map(function(t, i){
    return '<div class="list-item '+(t.d?'done':'')+'"><div class="chk" onclick="toggle('+i+')">'+(t.d?'✓':'')+'</div><div class="txt">'+escape(t.t)+'</div><button class="del" onclick="del('+i+')">×</button></div>';
  }).join('') : '<div class="empty">Bo\'sh. Yuqoriga vazifa qo\'shing!</div>';
  document.getElementById('list').innerHTML = html;
  document.getElementById('total').textContent = list.length;
  document.getElementById('done').textContent = list.filter(function(t){return t.d}).length;
  document.getElementById('left').textContent = list.filter(function(t){return !t.d}).length;
}
function escape(s){ return String(s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function add(){
  var v = document.getElementById('in').value.trim();
  if (!v) return;
  list.unshift({t: v, d: false, ts: Date.now()});
  document.getElementById('in').value = '';
  save(); render();
  toast.success('Vazifa qo\'shildi');
}
function toggle(i){ list[i].d = !list[i].d; save(); render(); if (list[i].d) window.confetti({count:20}); }
function del(i){ list.splice(i,1); save(); render(); }
function setF(f, el){ filter = f; document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act');}); el.classList.add('act'); render(); }
document.getElementById('in').addEventListener('keypress', function(e){ if (e.key==='Enter') add(); });
render();
</script>
</body>
</html>

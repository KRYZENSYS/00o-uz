<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; padding: 100px 20px 60px; }
.container { max-width: 700px; margin: 0 auto; }
h1 { font-size: 32px; margin-bottom: 8px; background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.bar { padding: 20px; border-radius: 16px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); margin-bottom: 16px; display: flex; gap: 8px; }
.bar input { flex: 1; padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
.bar select { padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.1); }
.bar button { padding: 12px 20px; border-radius: 10px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; font-weight: 700; cursor: pointer; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.s { padding: 12px; border-radius: 10px; text-align: center; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); }
.s-n { font-size: 20px; font-weight: 800; }
.s-l { font-size: 11px; color: #94a3b8; }
.filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.f { padding: 8px 14px; border-radius: 100px; background: rgba(255,255,255,0.05); cursor: pointer; font-size: 13px; }
.f.active { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
.item { padding: 14px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; margin-bottom: 6px; transition: 0.2s; }
.item:hover { background: rgba(255,255,255,0.05); }
.item.done { opacity: 0.5; text-decoration: line-through; }
.checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #8b5cf6; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.item.done .checkbox { background: #8b5cf6; }
.txt { flex: 1; }
.del { background: rgba(239,68,68,0.2); color: #fca5a5; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 100px; }
.tag.high { background: rgba(239,68,68,0.2); color: #fca5a5; }
.tag.med { background: rgba(245,158,11,0.2); color: #fcd34d; }
.tag.low { background: rgba(34,197,94,0.2); color: #86efac; }
</style>
</head>
<body>
<div class="container">
  <h1>✅ Todo List</h1>
  <div class="bar">
    <input id="t" placeholder="Yangi vazifa..." onkeydown="if(event.key==='Enter')add()">
    <select id="p"><option value="low">Past</option><option value="med" selected>O'rta</option><option value="high">Yuqori</option></select>
    <button onclick="add()">+ Qo'shish</button>
  </div>
  <div class="stats">
    <div class="s"><div class="s-n" id="sA">0</div><div class="s-l">Hammasi</div></div>
    <div class="s"><div class="s-n" id="sD">0</div><div class="s-l">Bajarildi</div></div>
    <div class="s"><div class="s-n" id="sP">0</div><div class="s-l">Kutilmoqda</div></div>
    <div class="s"><div class="s-n" id="sPct">0%</div><div class="s-l">Foiz</div></div>
  </div>
  <div class="filters">
    <div class="f active" onclick="setF('all',this)">Hammasi</div>
    <div class="f" onclick="setF('active',this)">Faol</div>
    <div class="f" onclick="setF('done',this)">Bajarilgan</div>
    <div class="f" onclick="setF('high',this)">🔴 Yuqori</div>
  </div>
  <div id="list"></div>
</div>
<script>
let items = JSON.parse(localStorage.getItem('oo-todos') || '[]');
let filter = 'all';
function save() { localStorage.setItem('oo-todos', JSON.stringify(items)); render(); }
function add() {
  const t = document.getElementById('t').value.trim();
  if (!t) return;
  items.push({id: Date.now(), t, p: document.getElementById('p').value, done: false, c: Date.now()});
  document.getElementById('t').value = '';
  save();
}
function toggle(id) { const i = items.find(x => x.id === id); if (i) i.done = !i.done; save(); }
function del(id) { items = items.filter(x => x.id !== id); save(); }
function setF(f, el) { document.querySelectorAll('.f').forEach(x => x.classList.remove('active')); el.classList.add('active'); filter = f; render(); }
function render() {
  const f = items.filter(i => filter === 'all' || (filter === 'active' && !i.done) || (filter === 'done' && i.done) || (filter === 'high' && i.p === 'high'));
  document.getElementById('list').innerHTML = f.map(i => `<div class="item ${i.done?'done':''}">
    <div class="checkbox" onclick="toggle(${i.id})">${i.done?'✓':''}</div>
    <div class="txt">${i.t}</div>
    <span class="tag ${i.p}">${i.p==='high'?'🔴':i.p==='med'?'🟡':'🟢'}</span>
    <button class="del" onclick="del(${i.id})">×</button>
  </div>`).join('') || '<div style="text-align:center;color:#94a3b8;padding:40px">Bo\'sh</div>';
  document.getElementById('sA').textContent = items.length;
  document.getElementById('sD').textContent = items.filter(i=>i.done).length;
  document.getElementById('sP').textContent = items.filter(i=>!i.done).length;
  const pct = items.length ? Math.round(items.filter(i=>i.done).length/items.length*100) : 0;
  document.getElementById('sPct').textContent = pct + '%';
}
render();
</script>
</body>
</html>

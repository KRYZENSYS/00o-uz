<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { text-align: center; }
h1 { font-size: 32px; margin-bottom: 8px; background: linear-gradient(135deg, #22c55e, #10b981);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 12px; font-family: monospace; }
canvas { background: #0a0e1a; border: 2px solid #22c55e; border-radius: 12px; max-width: 100%; display: block; }
.btns { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
.btn { padding: 10px 20px; border-radius: 100px; border: none; font-weight: 700; cursor: pointer; }
.btn-p { background: linear-gradient(135deg, #22c55e, #10b981); color: white; }
.controls { display: grid; grid-template-columns: repeat(3, 60px); gap: 6px; margin-top: 12px; justify-content: center; }
.ctrl { aspect-ratio: 1; border-radius: 8px; background: rgba(34,197,94,0.2); border: 1px solid #22c55e; color: white; font-size: 20px; cursor: pointer; }
@media (min-width:640px) { .controls { display: none; } }
</style>
</head>
<body>
<div class="box">
  <h1>🐍 Snake</h1>
  <div class="stats"><div>🏆 <span id="high">0</span></div><div>📊 <span id="score">0</span></div></div>
  <canvas id="c" width="400" height="400"></canvas>
  <div class="btns">
    <button class="btn btn-p" onclick="start()">▶ Boshlash</button>
    <button class="btn" style="background:rgba(255,255,255,0.05);color:white" onclick="pause()">⏸</button>
  </div>
  <div class="controls">
    <div></div><div class="ctrl" onclick="dir(0,-1)">↑</div><div></div>
    <div class="ctrl" onclick="dir(-1,0)">←</div><div></div><div class="ctrl" onclick="dir(1,0)">→</div>
    <div></div><div class="ctrl" onclick="dir(0,1)">↓</div><div></div>
  </div>
</div>
<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
const S = 20, N = 20;
let snake, food, dx, dy, score, running, high = parseInt(localStorage.getItem('oo-snake') || '0');
document.getElementById('high').textContent = high;
function init() { snake = [{x:10,y:10}]; food = spawn(); dx=1; dy=0; score=0; running=false; draw(); document.getElementById('score').textContent=score; }
function spawn() { return {x:Math.floor(Math.random()*N), y:Math.floor(Math.random()*N)}; }
function draw() {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, 400, 400);
  ctx.strokeStyle = 'rgba(34,197,94,0.1)';
  for (let i=0; i<=N; i++) { ctx.beginPath(); ctx.moveTo(i*S,0); ctx.lineTo(i*S,400); ctx.moveTo(0,i*S); ctx.lineTo(400,i*S); ctx.stroke(); }
  ctx.fillStyle = '#22c55e';
  snake.forEach((s, i) => { ctx.globalAlpha = 1 - i/snake.length*0.5; ctx.fillRect(s.x*S+1, s.y*S+1, S-2, S-2); });
  ctx.globalAlpha = 1; ctx.fillStyle = '#ef4444';
  ctx.beginPath(); ctx.arc(food.x*S+S/2, food.y*S+S/2, S/2-2, 0, Math.PI*2); ctx.fill();
}
function step() {
  const head = {x:snake[0].x+dx, y:snake[0].y+dy};
  if (head.x<0||head.x>=N||head.y<0||head.y>=N||snake.some(s=>s.x===head.x&&s.y===head.y)) { gameOver(); return; }
  snake.unshift(head);
  if (head.x===food.x&&head.y===food.y) { score++; document.getElementById('score').textContent=score; food=spawn(); if (score>high) { high=score; localStorage.setItem('oo-snake', high); document.getElementById('high').textContent=high; } }
  else snake.pop();
  draw();
}
function gameOver() { running=false; clearInterval(window.si); window.toast?.error(`Game Over! Ball: ${score}`, '💀'); }
function start() { if (running) return; running=true; window.si = setInterval(step, 100); }
function pause() { running=false; clearInterval(window.si); }
function dir(x, y) { if ((x===0&&dy!==0)||(y===0&&dx!==0)) return; dx=x; dy=y; }
document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp') dir(0,-1);
  else if (e.key==='ArrowDown') dir(0,1);
  else if (e.key==='ArrowLeft') dir(-1,0);
  else if (e.key==='ArrowRight') dir(1,0);
  else if (e.key===' ') start();
});
init();
</script>
</body>
</html>

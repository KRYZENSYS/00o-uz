<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Snake — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;background:linear-gradient(135deg,#22c55e,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.score-row{display:flex;gap:8px;width:100%;margin-bottom:12px}
.score{flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.05);text-align:center}
.s-n{font-size:22px;font-weight:800;color:#22c55e}
.s-l{font-size:10px;color:#94a3b8;text-transform:uppercase}
canvas{width:100%;max-width:380px;aspect-ratio:1;background:rgba(0,0,0,0.4);border-radius:12px;border:1px solid rgba(255,255,255,0.06);touch-action:none}
.controls{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(2,60px);gap:6px;margin-top:14px}
.ctrl{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:white;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.ctrl:active{background:rgba(139,92,246,0.3)}
.ctrl.empty{visibility:hidden}
button{padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}
.ov.on{display:flex}
.ov h2{font-size:36px;background:linear-gradient(135deg,#ef4444,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
</style>
</head>
<body>
<h1>🐍 Snake</h1>
<div class="score-row">
  <div class="score"><div class="s-n" id="sc">0</div><div class="s-l">Ball</div></div>
  <div class="score"><div class="s-n" id="best">0</div><div class="s-l">Eng yaxshi</div></div>
</div>
<canvas id="c" width="380" height="380"></canvas>
<div class="controls">
  <div class="ctrl empty"></div>
  <div class="ctrl" onclick="setD(0,-1)">↑</div>
  <div class="ctrl empty"></div>
  <div class="ctrl" onclick="setD(-1,0)">←</div>
  <div class="ctrl empty"></div>
  <div class="ctrl" onclick="setD(1,0)">→</div>
  <div class="ctrl empty"></div>
  <div class="ctrl" onclick="setD(0,1)">↓</div>
  <div class="ctrl empty"></div>
</div>
<button onclick="start()">🔄 Yangi o'yin</button>
<div class="ov" id="ov">
  <h2>O'yin tugadi! 💀</h2>
  <p style="color:#cbd5e1;margin-bottom:20px" id="ot">Ball: 0</p>
  <button style="max-width:200px" onclick="start()">Yana</button>
</div>
<script>
var cv=document.getElementById('c'), ctx=cv.getContext('2d');
var N=20, sz, sn, fd, dir, score, best=parseInt(localStorage.getItem('oo-snake-best')||'0'), loop, alive;
function init(){ sz=cv.width/N; sn=[{x:10,y:10}]; dir={x:0,y:0}; score=0; alive=true; placeFd(); document.getElementById('ov').classList.remove('on'); }
function placeFd(){ while(true){ var x=Math.floor(Math.random()*N), y=Math.floor(Math.random()*N); if(!sn.some(function(s){return s.x===x&&s.y===y;})){ fd={x:x,y:y}; return; } } }
function draw(){
  ctx.fillStyle='#0a0e1a'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  for(var i=0;i<N;i++){ for(var j=0;j<N;j++){ ctx.strokeRect(i*sz,j*sz,sz,sz); } }
  // Food
  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.arc(fd.x*sz+sz/2,fd.y*sz+sz/2,sz/2-2,0,Math.PI*2); ctx.fill();
  // Snake
  for(var k=0;k<sn.length;k++){
    var s=sn[k];
    var grad=ctx.createLinearGradient(s.x*sz,s.y*sz,s.x*sz+sz,s.y*sz+sz);
    grad.addColorStop(0, k===0?'#22c55e':'#10b981');
    grad.addColorStop(1, k===0?'#10b981':'#059669');
    ctx.fillStyle=grad;
    ctx.fillRect(s.x*sz+1,s.y*sz+1,sz-2,sz-2);
    if(k===0){ ctx.fillStyle='white'; ctx.fillRect(s.x*sz+sz/3,s.y*sz+sz/3,4,4); ctx.fillRect(s.x*sz+2*sz/3-2,s.y*sz+sz/3,4,4); }
  }
  document.getElementById('sc').textContent=score;
  document.getElementById('best').textContent=best;
  if(score>best){ best=score; localStorage.setItem('oo-snake-best', best); }
}
function step(){
  if(!alive) return;
  var head={x:sn[0].x+dir.x, y:sn[0].y+dir.y};
  if(head.x<0||head.y<0||head.x>=N||head.y>=N||sn.some(function(s){return s.x===head.x&&s.y===head.y;})){ alive=false; document.getElementById('ot').textContent='Ball: '+score; document.getElementById('ov').classList.add('on'); return; }
  sn.unshift(head);
  if(head.x===fd.x&&head.y===fd.y){ score+=10; placeFd(); } else sn.pop();
  draw();
}
function start(){ if(loop) clearInterval(loop); init(); draw(); loop=setInterval(step,100); }
function setD(x,y){ if(dir.x===-x&&dir.y===-y) return; if(dir.x===0&&dir.y===0||dir.x!==x||dir.y!==y) dir={x:x,y:y}; }
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowUp'||e.key==='w') setD(0,-1);
  if(e.key==='ArrowDown'||e.key==='s') setD(0,1);
  if(e.key==='ArrowLeft'||e.key==='a') setD(-1,0);
  if(e.key==='ArrowRight'||e.key==='d') setD(1,0);
  e.preventDefault();
});
// Touch swipe
var sx=0,sy=0;
cv.addEventListener('touchstart', function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; });
cv.addEventListener('touchend', function(e){ var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy; if(Math.abs(dx)<20&&Math.abs(dy)<20) return; if(Math.abs(dx)>Math.abs(dy)) setD(dx>0?1:-1,0); else setD(0,dy>0?1:-1); });
start();
</script>
</body>
</html>

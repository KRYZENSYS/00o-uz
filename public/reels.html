<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels — 00o.uz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #000; color: white; min-height: 100vh; overflow: hidden; }
nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; padding: 16px 0; }
.container { max-width: 480px; margin: 0 auto; padding: 0 20px; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #ec4899, #8b5cf6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.nav-links { display: flex; gap: 6px; list-style: none; }
.nav-links a { color: white; text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: 6px; }
.reels-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; padding-top: 70px; }
.reels-feed::-webkit-scrollbar { display: none; }
.reel { height: calc(100vh - 70px); scroll-snap-align: start; position: relative;
  display: flex; align-items: flex-end; padding: 20px;
  background-size: cover; background-position: center; }
.reel::before { content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.8) 100%); }
.reel-info { position: relative; z-index: 2; flex: 1; }
.reel-author { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.reel-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #ec4899);
  display: flex; align-items: center; justify-content: center; font-size: 18px; }
.reel-name { font-weight: 700; }
.reel-follow { margin-left: 8px; padding: 4px 12px; border-radius: 100px; background: #ec4899;
  border: none; color: white; font-weight: 700; font-size: 12px; cursor: pointer; }
.reel-caption { font-size: 14px; line-height: 1.4; max-width: 280px; }
.reel-music { color: #94a3b8; font-size: 12px; margin-top: 8px; }
.reel-actions { position: relative; z-index: 2; display: flex; flex-direction: column;
  gap: 20px; align-items: center; }
.reel-action { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.reel-action-icon { font-size: 30px; }
.reel-action-count { font-size: 12px; }
.reel-emoji { font-size: 120px; }
.play-pause { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 60px; opacity: 0; pointer-events: none; z-index: 3; transition: 0.3s; }
.play-pause.show { opacity: 0.6; }
</style>
</head>
<body>
<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">🎬 Reels</a>
    <ul class="nav-links">
      <li><a href="index.html">Bosh</a></li>
      <li><a href="stories.html">📖</a></li>
      <li><a href="community.html">Community</a></li>
    </ul>
  </div>
</nav>
<div class="reels-feed" id="feed">
  <div class="play-pause" id="playPause">⏸</div>
</div>
<script>
const reels = [
  {emoji:'🚀', bg:'linear-gradient(135deg,#8b5cf6,#ec4899)', author:'Jasur_dev', caption:'Yangi startapni ko\'rsataman! 🚀\n#startap #uzbekistan', music:'🎵 Original - Jasur', likes:12400, comments:892, shares:234},
  {emoji:'💻', bg:'linear-gradient(135deg,#06b6d4,#3b82f6)', author:'code_with_ali', caption:'Bugun 100 commit qildim 💻\n#coding #developer', music:'🎵 Lo-fi - Chill beats', likes:8920, comments:432, shares:156},
  {emoji:'🎨', bg:'linear-gradient(135deg,#f59e0b,#ef4444)', author:'design_studio', caption:'Yangi dizayn konsepti 🎨\n#design #ui #ux', music:'🎵 Coffee shop vibes', likes:15600, comments:1203, shares:567},
  {emoji:'📚', bg:'linear-gradient(135deg,#22c55e,#06b6d4)', author:'learn_hub', caption:'Bugun nima o\'rgandingiz? 📚', music:'🎵 Acoustic morning', likes:6700, comments:345, shares:89},
  {emoji:'🤖', bg:'linear-gradient(135deg,#3b82f6,#8b5cf6)', author:'ai_master', caption:'AI bilan 5 daqiqada app! 🤖\n#ai #no-code', music:'🎵 Tech beats', likes:21000, comments:1890, shares:892},
];
const feed = document.getElementById('feed');
feed.innerHTML = reels.map((r, i) => `
  <div class="reel" style="background:${r.bg}" data-i="${i}">
    <div class="play-pause">⏸</div>
    <div class="reel-info">
      <div class="reel-author">
        <div class="reel-avatar">${r.emoji}</div>
        <div class="reel-name">@${r.author}</div>
        <button class="reel-follow">+ Follow</button>
      </div>
      <div class="reel-caption">${r.caption}</div>
      <div class="reel-music">${r.music}</div>
    </div>
    <div class="reel-actions">
      <div class="reel-action" onclick="like(this, ${r.likes})"><div class="reel-action-icon">❤️</div><div class="reel-action-count">${(r.likes/1000).toFixed(1)}K</div></div>
      <div class="reel-action"><div class="reel-action-icon">💬</div><div class="reel-action-count">${r.comments}</div></div>
      <div class="reel-action"><div class="reel-action-icon">📤</div><div class="reel-action-count">${r.shares}</div></div>
      <div class="reel-action"><div class="reel-action-icon">🔖</div><div class="reel-action-count">Save</div></div>
    </div>
  </div>
`).join('');
function like(el, n) {
  el.style.transform = 'scale(1.3)';
  setTimeout(() => el.style.transform = '', 200);
  el.querySelector('.reel-action-count').textContent = ((n+1)/1000).toFixed(1) + 'K';
}
let playing = true;
document.addEventListener('click', e => {
  if (e.target.closest('.reel')) {
    playing = !playing;
    document.querySelectorAll('.play-pause').forEach(p => p.classList.toggle('show', !playing));
    setTimeout(() => document.querySelectorAll('.play-pause').forEach(p => p.classList.remove('show')), 500);
  }
});
</script>
</body>
</html>

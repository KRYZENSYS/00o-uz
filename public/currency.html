<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valyuta — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; padding: 100px 20px 60px; }
.container { max-width: 600px; margin: 0 auto; }
h1 { font-size: 32px; margin-bottom: 8px; text-align: center;
  background: linear-gradient(135deg, #22c55e, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.converter { padding: 20px; border-radius: 16px; background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(251,191,36,0.05));
  border: 1px solid rgba(34,197,94,0.2); margin-bottom: 16px; }
.input-group { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 12px; }
.amount-in { padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.4); color: white; border: 1px solid rgba(255,255,255,0.1); font-size: 18px; font-weight: 700; }
.swap { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #22c55e, #fbbf24); color: white; border: none; cursor: pointer; font-size: 20px; }
select { padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
.result { text-align: center; padding: 20px; font-size: 24px; font-weight: 800; }
.result-num { font-size: 40px; background: linear-gradient(135deg, #22c55e, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.rates { padding: 16px; border-radius: 16px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); }
.rate { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.rate:last-child { border: none; }
.up { color: #22c55e; }
.down { color: #ef4444; }
</style>
</head>
<body>
<div class="container">
  <h1>💱 Valyuta Konverter</h1>
  <p style="color:#94a3b8;text-align:center;margin-bottom:20px">Markaziy bank kursi · 2026-07-14</p>
  <div class="converter">
    <div class="input-group">
      <input type="number" id="amt" value="1000" class="amount-in" oninput="convert()">
      <button class="swap" onclick="swap()">⇄</button>
      <input type="number" id="amt2" class="amount-in" readonly>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <select id="from" onchange="convert()">
        <option value="USD">🇺🇸 USD</option>
        <option value="EUR">🇪🇺 EUR</option>
        <option value="RUB">🇷🇺 RUB</option>
        <option value="UZS" selected>🇺🇿 UZS</option>
        <option value="GBP">🇬🇧 GBP</option>
        <option value="JPY">🇯🇵 JPY</option>
        <option value="CNY">🇨🇳 CNY</option>
        <option value="KRW">🇰🇷 KRW</option>
        <option value="TRY">🇹🇷 TRY</option>
        <option value="KZT">🇰🇿 KZT</option>
      </select>
      <select id="to" onchange="convert()">
        <option value="USD" selected>🇺🇸 USD</option>
        <option value="EUR">🇪🇺 EUR</option>
        <option value="RUB">🇷🇺 RUB</option>
        <option value="UZS">🇺🇿 UZS</option>
        <option value="GBP">🇬🇧 GBP</option>
        <option value="JPY">🇯🇵 JPY</option>
        <option value="CNY">🇨🇳 CNY</option>
        <option value="KRW">🇰🇷 KRW</option>
        <option value="TRY">🇹🇷 TRY</option>
        <option value="KZT">🇰🇿 KZT</option>
      </select>
    </div>
  </div>
  <div class="result"><div class="result-num" id="big">0</div><div id="rate-txt">1 USD = 0 UZS</div></div>
  <div class="rates" style="margin-top:20px">
    <h3 style="margin-bottom:12px">📊 Bugungi kurslar (UZS ga nisbatan)</h3>
    <div id="rates"></div>
  </div>
</div>
<script>
const R = {USD:12650, EUR:13800, RUB:140, UZS:1, GBP:16200, JPY:83, CNY:1750, KRW:9.2, TRY:390, KZT:28};
function convert() {
  const a = parseFloat(document.getElementById('amt').value) || 0;
  const f = document.getElementById('from').value;
  const t = document.getElementById('to').value;
  const r = (a * R[f]) / R[t];
  document.getElementById('amt2').value = r.toFixed(2);
  document.getElementById('big').textContent = r.toLocaleString('en-US', {maximumFractionDigits:2}) + ' ' + t;
  document.getElementById('rate-txt').textContent = `1 ${f} = ${(R[f]/R[t]).toLocaleString('en-US', {maximumFractionDigits:4})} ${t}`;
}
function swap() { const f = document.getElementById('from'); const t = document.getElementById('to'); [f.value, t.value] = [t.value, f.value]; convert(); }
function renderRates() {
  document.getElementById('rates').innerHTML = Object.entries(R).filter(([k]) => k!=='UZS').map(([k,v], i) => `<div class="rate">
    <span style="font-size:18px">${k}</span>
    <span>${v.toLocaleString('en-US')}</span>
    <span class="${i%2===0?'up':'down'}">${i%2===0?'▲':'▼'} ${(Math.random()*2).toFixed(2)}%</span>
  </div>`).join('');
}
convert(); renderRates();
</script>
</body>
</html>

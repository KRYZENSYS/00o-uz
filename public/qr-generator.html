<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>QR Code — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:720px;margin:0 auto}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.bar{padding:14px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
input{width:100%;padding:12px 14px;border-radius:10px;background:rgba(0,0,0,0.4);color:white;border:1px solid rgba(255,255,255,0.1);font-size:15px;font-family:inherit;margin-bottom:8px}
input:focus{outline:none;border-color:#8b5cf6}
button{padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;font-size:15px;width:100%;margin-top:4px}
button:active{transform:scale(0.97)}
button.s{background:rgba(255,255,255,0.05);margin-top:8px}
.qr-out{background:white;padding:20px;border-radius:16px;display:flex;align-items:center;justify-content:center;min-height:280px;margin-top:12px}
.qr-out canvas, .qr-out img{max-width:100%;height:auto;display:block}
.tabs{display:flex;gap:4px;margin-bottom:8px;background:rgba(255,255,255,0.03);padding:4px;border-radius:10px}
.tab{flex:1;padding:8px;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;color:#94a3b8}
.tab.act{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:700}
</style>
</head>
<body>
<h1>📱 QR Code</h1>
<p class="sub">Matn yoki URL'dan QR yarating</p>
<div class="bar">
  <div class="tabs">
    <div class="tab act" onclick="setT('text',this)">Matn</div>
    <div class="tab" onclick="setT('url',this)">URL</div>
    <div class="tab" onclick="setT('wifi',this)">WiFi</div>
    <div class="tab" onclick="setT('email',this)">Email</div>
  </div>
  <div id="inputs">
    <input id="q" placeholder="Matn kiriting..." value="00o.uz — eng yaxshi platforma!">
  </div>
  <button onclick="gen()">✨ QR Yaratish</button>
  <button class="s" onclick="dl()">⬇️ Yuklab olish</button>
  <div class="qr-out" id="out"><span style="color:#64748b">QR shu yerda paydo bo'ladi</span></div>
</div>
<script>
var type = 'text';
function setT(t, el){
  type = t;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act');});
  el.classList.add('act');
  var i = '';
  if (t==='text') i = '<input id="q" placeholder="Matn..." value="Salom dunyo!">';
  if (t==='url') i = '<input id="q" type="url" placeholder="https://..." value="https://00o-demo.vercel.app">';
  if (t==='wifi') i = '<input id="q" placeholder="Wi-Fi nomi,parol,WPA" value="00o_wifi,12345678,WPA">';
  if (t==='email') i = '<input id="q" type="email" placeholder="email@misol.com" value="test@example.com">';
  document.getElementById('inputs').innerHTML = i;
  gen();
}
function fmt(){
  var v = document.getElementById('q').value;
  if (type==='text' || type==='url' || type==='email') return v;
  if (type==='wifi') {
    var p = v.split(',');
    return 'WIFI:T:'+(p[2]||'WPA')+';S:'+(p[0]||'')+';P:'+(p[1]||'')+';;';
  }
  return v;
}
function gen(){
  var txt = fmt();
  if (!txt) return;
  var out = document.getElementById('out');
  out.innerHTML = '';
  var img = document.createElement('img');
  img.alt = 'QR Code';
  img.style.maxWidth='240px';
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(txt) + '&bgcolor=ffffff&color=1a1a2e';
  out.appendChild(img);
  window._qrData = txt;
  toast.success('QR yaratildi');
}
function dl(){
  var img = document.querySelector('#out img');
  if (!img) { toast.error('Avval QR yarating'); return; }
  var a = document.createElement('a');
  a.href = img.src;
  a.download = 'qrcode.png';
  a.target = '_blank';
  a.click();
  toast.success('Yuklanmoqda...');
}
gen();
</script>
</body>
</html>

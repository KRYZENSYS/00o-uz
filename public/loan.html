<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kredit kalkulyator — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; padding: 100px 20px 60px; }
.container { max-width: 700px; margin: 0 auto; }
h1 { font-size: 32px; margin-bottom: 8px; text-align: center;
  background: linear-gradient(135deg, #06b6d4, #3b82f6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.box { padding: 20px; border-radius: 16px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); margin-bottom: 16px; }
.label { display: flex; justify-content: space-between; margin-bottom: 6px; }
.label-v { font-weight: 700; color: #06b6d4; }
input[type=range] { width: 100%; margin-bottom: 16px; }
.result { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin: 16px 0; }
.s { padding: 16px; border-radius: 12px; background: linear-gradient(135deg, rgba(6,182,212,0.1), rgba(59,130,246,0.05));
  border: 1px solid rgba(6,182,212,0.2); text-align: center; }
.s-n { font-size: 24px; font-weight: 800; color: #06b6d4; }
.s-l { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
.chart { display: flex; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 16px; }
.c-pr { background: #06b6d4; }
.c-in { background: #ec4899; }
.legend { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: #94a3b8; }
table { width: 100%; margin-top: 16px; font-size: 12px; border-collapse: collapse; }
th, td { padding: 6px; text-align: right; }
th { background: rgba(255,255,255,0.05); }
</style>
</head>
<body>
<div class="container">
  <h1>💰 Kredit Kalkulyator</h1>
  <div class="box">
    <div class="label">Kredit miqdori: <span class="label-v" id="av">50,000,000 so'm</span></div>
    <input type="range" id="amt" min="1000000" max="500000000" value="50000000" step="1000000">
    <div class="label">Muddat: <span class="label-v" id="mv">36 oy</span></div>
    <input type="range" id="term" min="3" max="120" value="36" step="3">
    <div class="label">Foiz: <span class="label-v" id="rv">22%</span></div>
    <input type="range" id="rate" min="5" max="40" value="22" step="0.5">
  </div>
  <div class="result">
    <div class="s"><div class="s-n" id="mP">0</div><div class="s-l">Oylik to'lov</div></div>
    <div class="s"><div class="s-n" id="tP">0</div><div class="s-l">Jami to'lov</div></div>
    <div class="s"><div class="s-n" id="tI">0</div><div class="s-l">Foiz xarajati</div></div>
  </div>
  <div class="box">
    <h3 style="margin-bottom:8px">📊 To'lov tarkibi</h3>
    <div class="chart"><div class="c-pr" id="barP"></div><div class="c-in" id="barI"></div></div>
    <div class="legend"><div>🟦 Asosiy qarz: <span id="legP">0%</span></div><div>🟪 Foiz: <span id="legI">0%</span></div></div>
  </div>
  <div class="box">
    <h3 style="margin-bottom:8px">📅 To'lov jadvali</h3>
    <div style="max-height:300px;overflow-y:auto">
      <table id="tbl"><thead><tr><th>#</th><th>Asosiy</th><th>Foiz</th><th>To'lov</th><th>Qoldiq</th></tr></thead><tbody></tbody></table>
    </div>
  </div>
</div>
<script>
function fmt(n) { return n.toLocaleString('uz-UZ'); }
function calc() {
  const a = parseFloat(document.getElementById('amt').value);
  const t = parseInt(document.getElementById('term').value);
  const r = parseFloat(document.getElementById('rate').value) / 100 / 12;
  document.getElementById('av').textContent = fmt(a) + " so'm";
  document.getElementById('mv').textContent = t + ' oy';
  document.getElementById('rv').textContent = (r*12*100).toFixed(0) + '%';
  const m = a * (r * Math.pow(1+r, t)) / (Math.pow(1+r, t) - 1);
  const tot = m * t;
  const ti = tot - a;
  document.getElementById('mP').textContent = fmt(Math.round(m));
  document.getElementById('tP').textContent = fmt(Math.round(tot));
  document.getElementById('tI').textContent = fmt(Math.round(ti));
  const pp = a / tot * 100, pi = ti / tot * 100;
  document.getElementById('barP').style.width = pp + '%';
  document.getElementById('barI').style.width = pi + '%';
  document.getElementById('legP').textContent = pp.toFixed(1) + '%';
  document.getElementById('legI').textContent = pi.toFixed(1) + '%';
  // Table
  let rem = a, html = '';
  for (let i = 1; i <= t; i++) {
    const intr = rem * r;
    const princ = m - intr;
    rem -= princ;
    if (rem < 0) rem = 0;
    if (i <= 12 || i === t || i % 12 === 0) html += `<tr><td>${i}</td><td>${fmt(Math.round(princ))}</td><td>${fmt(Math.round(intr))}</td><td>${fmt(Math.round(m))}</td><td>${fmt(Math.round(rem))}</td></tr>`;
  }
  document.querySelector('#tbl tbody').innerHTML = html;
}
['amt','term','rate'].forEach(id => document.getElementById(id).oninput = calc);
calc();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Kalkulyator — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 20px;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
h1{font-size:clamp(20px,5vw,24px);font-weight:800;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.disp{padding:20px;border-radius:16px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.06);margin-bottom:12px;text-align:right;min-height:100px;display:flex;flex-direction:column;justify-content:flex-end}
.expr{color:#94a3b8;font-size:16px;min-height:20px;word-break:break-all}
.res{font-size:48px;font-weight:800;line-height:1;font-family:ui-monospace,monospace;color:white;word-break:break-all;margin-top:4px}
.g{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:1}
.b{padding:0;font-size:22px;font-weight:700;border:none;background:rgba(255,255,255,0.05);color:white;border-radius:14px;cursor:pointer;min-height:60px;transition:transform 0.1s}
.b:active{transform:scale(0.95)}
.b.op{background:linear-gradient(135deg,#8b5cf6,#ec4899);font-size:26px}
.b.fn{background:rgba(139,92,246,0.2);color:#c4b5fd}
.b.eq{background:linear-gradient(135deg,#22c55e,#10b981);font-size:28px}
</style>
</head>
<body>
<h1>🧮 Kalkulyator</h1>
<div class="disp">
  <div class="expr" id="e"></div>
  <div class="res" id="r">0</div>
</div>
<div class="g">
  <button class="b fn" onclick="clr()">C</button>
  <button class="b fn" onclick="del()">⌫</button>
  <button class="b fn" onclick="add('%')">%</button>
  <button class="b op" onclick="add('÷')">÷</button>
  <button class="b" onclick="add('7')">7</button>
  <button class="b" onclick="add('8')">8</button>
  <button class="b" onclick="add('9')">9</button>
  <button class="b op" onclick="add('×')">×</button>
  <button class="b" onclick="add('4')">4</button>
  <button class="b" onclick="add('5')">5</button>
  <button class="b" onclick="add('6')">6</button>
  <button class="b op" onclick="add('−')">−</button>
  <button class="b" onclick="add('1')">1</button>
  <button class="b" onclick="add('2')">2</button>
  <button class="b" onclick="add('3')">3</button>
  <button class="b op" onclick="add('+')">+</button>
  <button class="b" onclick="add('(')">(</button>
  <button class="b" onclick="add('0')">0</button>
  <button class="b" onclick="add('.')">.</button>
  <button class="b op" onclick="add(')')">)</button>
  <button class="b fn" style="grid-column:span 2" onclick="add('√(')">√</button>
  <button class="b fn" style="grid-column:span 2" onclick="add('²')">x²</button>
  <button class="b eq" style="grid-column:span 4" onclick="calc()">=</button>
</div>
<script>
var e='';
function add(v){
  if(e==='0' && !isOp(v)) e=v;
  else if(isOp(v) && e && isOp(e.slice(-1))) e=e.slice(0,-1)+v;
  else e+=v;
  show();
}
function isOp(c){ return ['+','−','×','÷','%','('].indexOf(c)>=0; }
function clr(){ e=''; show(true); }
function del(){ e=e.slice(0,-1); show(); }
function calc(){
  try {
    var v=e.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/√\(/g,'Math.sqrt(').replace(/²/g,'**2');
    while((v.match(/\(/g)||[]).length>(v.match(/\)/g)||[]).length) v+=')';
    var r=Function('"use strict";return ('+v+')')();
    if(!isFinite(r)) throw 0;
    document.getElementById('e').textContent=e+' =';
    e=String(+r.toFixed(10));
    show();
  } catch(err){ document.getElementById('e').textContent='Xato'; e=''; }
}
function show(clear){
  document.getElementById('r').textContent=e||'0';
  if(clear) document.getElementById('e').textContent='';
}
show();
</script>
</body>
</html>

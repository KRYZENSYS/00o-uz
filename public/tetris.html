<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { text-align: center; }
h1 { font-size: 32px; margin-bottom: 8px; background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
canvas { background: #0a0e1a; border: 2px solid #8b5cf6; border-radius: 12px; max-width: 100%; }
.s { display: flex; gap: 16px; justify-content: center; margin: 12px 0; font-family: monospace; }
.btn { padding: 10px 20px; border-radius: 100px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="box">
  <h1>🧱 Tetris</h1>
  <div class="s"><div>📊 <span id="sc">0</span></div><div>📈 <span id="lv">1</span></div><div>🧹 <span id="ln">0</span></div></div>
  <canvas id="c" width="300" height="600"></canvas>
  <div style="margin-top:12px"><button class="btn" onclick="start()">▶ Boshlash</button></div>
</div>
<script>
const c = document.getElementById('c'), ctx = c.getContext('2d');
const S = 30, W = 10, H = 20;
let board, piece, dx, dy, score, level, lines, timer, running = false;
const shapes = [
  {color:'#8b5cf6', s:[[1,1,1,1]]},
  {color:'#ec4899', s:[[1,1],[1,1]]},
  {color:'#06b6d4', s:[[0,1,0],[1,1,1]]},
  {color:'#22c55e', s:[[1,1,0],[0,1,1]]},
  {color:'#f59e0b', s:[[0,1,1],[1,1,0]]},
  {color:'#ef4444', s:[[1,0,0],[1,1,1]]},
  {color:'#fbbf24', s:[[0,0,1],[1,1,1]]}
];
function init() { board = Array.from({length:H}, () => Array(W).fill(0)); score=0; level=1; lines=0; dx=3; dy=0; piece = random(); draw(); }
function random() { const s = shapes[Math.floor(Math.random()*shapes.length)]; return {color:s.color, s:s.s, x:3, y:0}; }
function draw() {
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0,0,300,600);
  for (let y=0;y<H;y++) for (let x=0;x<W;x++) if (board[y][x]) { ctx.fillStyle = board[y][x]; ctx.fillRect(x*S+1,y*S+1,S-2,S-2); }
  piece.s.forEach((r,py) => r.forEach((v,px) => { if (v) { ctx.fillStyle = piece.color; ctx.fillRect((piece.x+px)*S+1,(piece.y+py)*S+1,S-2,S-2); } }));
}
function coll(p, x, y) { return p.s.some((r,py) => r.some((v,px) => v && (board[y+py]&&board[y+py][x+px]!==undefined&&board[y+py][x+px]) || x+px<0 || x+px>=W || y+py>=H)); }
function merge() { piece.s.forEach((r,py) => r.forEach((v,px) => { if (v) board[piece.y+py][piece.x+px] = piece.color; })); }
function clearLines() { let c = 0; for (let y=H-1; y>=0; y--) { if (board[y].every(v=>v)) { board.splice(y,1); board.unshift(Array(W).fill(0)); c++; y++; } } if (c) { lines+=c; score+=c*100*level; level=Math.floor(lines/10)+1; update(); } }
function step() { if (coll(piece, piece.x, piece.y+1)) { merge(); clearLines(); piece = random(); if (coll(piece, piece.x, piece.y)) { running=false; clearInterval(timer); window.toast?.error('Game Over!'); return; } } else piece.y++; draw(); }
function rotate() { const old = piece.s; piece.s = piece.s[0].map((_,i) => piece.s.map(r=>r[i]).reverse()); if (coll(piece, piece.x, piece.y)) piece.s = old; }
function update() { document.getElementById('sc').textContent=score; document.getElementById('lv').textContent=level; document.getElementById('ln').textContent=lines; }
function start() { if (running) return; running=true; timer = setInterval(step, Math.max(100, 800-level*80)); }
function drop() { while (!coll(piece, piece.x, piece.y+1)) piece.y++; }
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft' && !coll(piece, piece.x-1, piece.y)) piece.x--;
  else if (e.key==='ArrowRight' && !coll(piece, piece.x+1, piece.y)) piece.x++;
  else if (e.key==='ArrowDown') step();
  else if (e.key==='ArrowUp') rotate();
  else if (e.key===' ') { drop(); step(); }
  draw();
});
init();
</script>
</body>
</html>

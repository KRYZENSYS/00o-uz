<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Timer — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,0.03);padding:4px;border-radius:10px;width:100%}
.tab{flex:1;padding:8px;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;color:#94a3b8}
.tab.act{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:700}
.dial{width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,0.03);border:8px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;margin:16px auto;position:relative}
.dial-num{font-size:56px;font-weight:800;font-family:ui-monospace,monospace;color:#fff}
.dial-l{font-size:11px;color:#94a3b8;text-transform:uppercase;position:absolute;bottom:30px}
.dial-c{position:absolute;inset:-8px;border-radius:50%;clip-path:polygon(50% 50%, 50% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 50%);transform:rotate(0deg);transition:transform 1s linear;background:conic-gradient(from 0deg, transparent 0deg, #8b5cf6 0deg, transparent 0deg);opacity:0.3;pointer-events:none}
.btns{display:flex;gap:8px;width:100%}
.btns button{flex:1;padding:14px;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;font-size:15px}
.btns button.s{background:rgba(255,255,255,0.05)}
.btns button:active{transform:scale(0.97)}
.lap{padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:4px;display:flex;justify-content:space-between;font-family:ui-monospace,monospace;font-size:13px}
.lap-n{color:#8b5cf6;font-weight:700}
.laps{max-height:200px;overflow-y:auto;width:100%;margin-top:8px}
</style>
</head>
<body>
<h1>⏱️ Timer</h1>
<p class="sub">Sekundomer, taymer, pomodoro</p>
<div class="tabs">
  <div class="tab act" onclick="setM('stop',this)">⏱ Stopwatch</div>
  <div class="tab" onclick="setM('timer',this)">⏲ Timer</div>
  <div class="tab" onclick="setM('pomo',this)">🍅 Pomodoro</div>
</div>
<div class="dial">
  <div class="dial-c" id="dc"></div>
  <div>
    <div class="dial-num" id="d">00:00.00</div>
    <div class="dial-l" id="dl">STOPWATCH</div>
  </div>
</div>
<div class="btns" id="btns"></div>
<div class="laps" id="laps"></div>
<script>
var mode='stop', t1=null, base=0, acc=0, laps=[], timerDur=60, pomoPhase='work';
function setM(m,el){
  mode=m;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act');}); el.classList.add('act');
  stop();
  base=0; acc=0; laps=[]; render(); renderLaps();
  if(m==='timer'){ document.getElementById('dl').textContent='TIMER'; showTimerInp(); }
  else if(m==='pomo'){ document.getElementById('dl').textContent='POMODORO · 25:00'; pomoPhase='work'; base=25*60*1000; updDisp(); renderBtns(); return; }
  else { document.getElementById('dl').textContent='STOPWATCH'; }
  renderBtns();
}
function showTimerInp(){
  var v=prompt('Daqiqa kiriting (1-60):','5');
  if(!v||isNaN(v)){ setM('stop',document.querySelector('.tab')); return; }
  timerDur=Math.max(1,Math.min(60,parseInt(v)))*60*1000;
  base=timerDur; acc=0;
  document.getElementById('dl').textContent='TIMER';
  renderBtns(); updDisp();
}
function fmt(ms){
  var h=Math.floor(ms/3600000), m=Math.floor(ms%3600000/60000), s=Math.floor(ms%60000/1000), cs=Math.floor(ms%1000/10);
  return (h?h+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+(mode==='stop'?'.'+String(cs).padStart(2,'0'):'');
}
function updDisp(){
  var v=mode==='pomo'||mode==='timer'?base-acc:base+acc;
  document.getElementById('d').textContent=fmt(Math.max(0,v));
  document.getElementById('dc').style.background='conic-gradient(#8b5cf6 '+(v/(mode==='stop'?60000:base))*360+'deg, transparent 0deg)';
  if((mode==='timer'||mode==='pomo')&&v<=0){ stop(); finishAlarm(); }
}
function start(){
  if(t1) return;
  t1=setInterval(function(){
    if(mode==='stop'){ acc=Date.now()-t1.start; }
    else { acc=Date.now()-t1.start; }
    updDisp();
  }, 50);
  if(mode==='stop') t1.start=Date.now()-acc;
  else t1.start=Date.now()-acc;
  t1.startTime=t1.start;
  renderBtns();
}
function stop(){
  if(t1){ clearInterval(t1); t1=null; }
  renderBtns();
}
function reset(){
  stop();
  base=mode==='pomo'?(pomoPhase==='work'?25*60*1000:5*60*1000):mode==='timer'?timerDur:0;
  acc=0; laps=[]; updDisp(); renderLaps();
}
function lap(){
  laps.unshift(fmt(base+acc));
  if(laps.length>20) laps.pop();
  renderLaps();
}
function renderBtns(){
  var h=document.getElementById('btns');
  if(mode==='stop'){
    h.innerHTML=t1?'<button class="s" onclick="stop()">⏸ To\'xtatish</button><button onclick="reset()">⟲</button><button onclick="lap()">🏁 Lap</button>':'<button onclick="start()">▶ Boshlash</button><button class="s" onclick="reset()">⟲</button>';
  } else {
    h.innerHTML=t1?'<button class="s" onclick="stop()">⏸ To\'xtatish</button><button onclick="reset()">⟲</button>':'<button onclick="start()">▶ Boshlash</button><button class="s" onclick="reset()">⟲</button>';
  }
}
function renderLaps(){
  document.getElementById('laps').innerHTML=laps.length?laps.map(function(l,i){return '<div class="lap"><span class="lap-n">#'+(laps.length-i)+'</span><span>'+l+'</span></div>';}).join(''):'';
}
function finishAlarm(){
  try { navigator.vibrate && navigator.vibrate([200,100,200,100,400]); } catch(e){}
  window.confetti({count:60});
  toast.success(mode==='pomo'?(pomoPhase==='work'?'Tanaffus vaqti! ☕':'Ish vaqti! 💪'):'Vaqt tugadi! ⏰');
  if(mode==='pomo'){ pomoPhase=pomoPhase==='work'?'break':'work'; base=(pomoPhase==='work'?25:5)*60*1000; }
}
renderBtns();
updDisp();
</script>
</body>
</html>

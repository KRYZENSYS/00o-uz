<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Kalkulyator — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { text-align: center; max-width: 500px; }
h1 { font-size: 32px; margin-bottom: 8px; background: linear-gradient(135deg, #22c55e, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tabs { display: flex; gap: 6px; justify-content: center; margin: 16px 0; }
.tab { padding: 8px 16px; border-radius: 100px; background: rgba(255,255,255,0.05); cursor: pointer; }
.tab.active { background: linear-gradient(135deg, #22c55e, #06b6d4); }
.gauge { width: 280px; height: 160px; margin: 20px auto; position: relative; overflow: hidden; }
.gauge svg { width: 100%; height: 100%; }
.bmi-num { font-size: 64px; font-weight: 800; font-family: monospace;
  background: linear-gradient(135deg, #22c55e, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.cat { font-size: 20px; font-weight: 700; margin: 8px 0; }
.inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
input { padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 16px; }
.info { padding: 16px; border-radius: 12px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); margin-top: 16px; }
.row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.row:last-child { border: none; }
</style>
</head>
<body>
<div class="box">
  <h1>⚖️ BMI Kalkulyator</h1>
  <div class="tabs">
    <div class="tab active" onclick="setU('metric', this)">📏 Metr</div>
    <div class="tab" onclick="setU('imperial', this)">📐 Inch</div>
  </div>
  <div class="gauge">
    <svg viewBox="0 0 200 110">
      <path d="M 10 100 A 90 90 0 0 1 190 100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="20"/>
      <path d="M 10 100 A 90 90 0 0 1 60 22" fill="none" stroke="#3b82f6" stroke-width="20"/>
      <path d="M 60 22 A 90 90 0 0 1 100 10" fill="none" stroke="#22c55e" stroke-width="20"/>
      <path d="M 100 10 A 90 90 0 0 1 140 22" fill="none" stroke="#fbbf24" stroke-width="20"/>
      <path d="M 140 22 A 90 90 0 0 1 190 100" fill="none" stroke="#ef4444" stroke-width="20"/>
      <line id="needle" x1="100" y1="100" x2="100" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="bmi-num" id="bmi">0</div>
  <div class="cat" id="cat">Ma'lumot kiriting</div>
  <div class="inputs">
    <input type="number" id="h" placeholder="Bo'y (sm)" value="175">
    <input type="number" id="w" placeholder="Vazn (kg)" value="70">
  </div>
  <div class="info">
    <div class="row"><span>Ideal vazn:</span><span id="ideal">-</span></div>
    <div class="row"><span>Kerakli kaloriya:</span><span id="cal">-</span></div>
    <div class="row"><span>Suv (kunlik):</span><span id="water">-</span></div>
  </div>
</div>
<script>
let unit = 'metric';
function setU(u, el) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); el.classList.add('active'); unit = u; const h = document.getElementById('h'); const w = document.getElementById('w'); h.placeholder = u==='metric'?'Bo\'y (sm)':'Bo\'y (in)'; w.placeholder = u==='metric'?'Vazn (kg)':'Vazn (lb)'; calc(); }
function calc() {
  let h = parseFloat(document.getElementById('h').value);
  let w = parseFloat(document.getElementById('w').value);
  if (!h || !w) return;
  if (unit === 'imperial') { h = h * 2.54; w = w * 0.453592; }
  const bmi = w / Math.pow(h/100, 2);
  document.getElementById('bmi').textContent = bmi.toFixed(1);
  let cat, deg, color;
  if (bmi < 18.5) { cat = '⚠️ Ozg\'in'; deg = -90 + (bmi / 18.5) * 45; color = '#3b82f6'; }
  else if (bmi < 25) { cat = '✅ Normal'; deg = -45 + ((bmi-18.5) / 6.5) * 45; color = '#22c55e'; }
  else if (bmi < 30) { cat = '⚠️ Ortiqcha'; deg = 0 + ((bmi-25) / 5) * 45; color = '#fbbf24'; }
  else { cat = '🔴 Semizlik'; deg = 45 + Math.min(((bmi-30) / 10) * 45, 45); color = '#ef4444'; }
  document.getElementById('cat').textContent = cat;
  document.getElementById('cat').style.color = color;
  const needle = document.getElementById('needle');
  needle.setAttribute('transform', `rotate(${deg} 100 100)`);
  needle.style.stroke = color;
  // Ideal weight (BMI 22)
  const idealH = h/100;
  const ideal = (22 * idealH * idealH).toFixed(1);
  document.getElementById('ideal').textContent = ideal + ' kg';
  document.getElementById('cal').textContent = Math.round(w * 30) + ' kcal';
  document.getElementById('water').textContent = Math.round(w * 35) + ' ml';
}
['h','w'].forEach(id => document.getElementById(id).oninput = calc);
calc();
</script>
</body>
</html>

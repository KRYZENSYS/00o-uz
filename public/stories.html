<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories — 00o.uz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; }
.container { max-width: 700px; margin: 0 auto; padding: 0 24px; }
nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,14,26,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; padding: 16px 0; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.nav-links { display: flex; gap: 8px; list-style: none; }
.nav-links a { color: #cbd5e1; text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 8px; }
.nav-links a:hover { background: rgba(255,255,255,0.05); }
.nav-links a.active { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
.btn-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; }
.st-hero { padding: 100px 0 20px; text-align: center; }
.st-hero h1 { font-size: 36px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #ec4899, #8b5cf6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.story-row { display: flex; gap: 14px; overflow-x: auto; padding: 24px 0;
  scrollbar-width: none; -ms-overflow-style: none; }
.story-row::-webkit-scrollbar { display: none; }
.story { flex-shrink: 0; text-align: center; cursor: pointer; }
.story-ring { width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, #ec4899, #f59e0b, #8b5cf6); padding: 3px; }
.story-ring.viewed { background: rgba(100,116,139,0.5); }
.story-avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #0a0e1a;
  background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  display: flex; align-items: center; justify-content: center; font-size: 28px; }
.story-name { font-size: 11px; margin-top: 6px; max-width: 72px; overflow: hidden; text-overflow: ellipsis; }
.story-viewer { display: none; position: fixed; inset: 0; background: #000; z-index: 200;
  flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.story-viewer.open { display: flex; }
.sv-header { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; align-items: center; gap: 12px; }
.sv-progress { flex: 1; display: flex; gap: 4px; }
.sv-prog { flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
.sv-prog-fill { height: 100%; background: white; width: 0; }
.sv-close { background: rgba(255,255,255,0.1); border: none; color: white; width: 36px; height: 36px;
  border-radius: 50%; cursor: pointer; font-size: 18px; }
.sv-content { text-align: center; max-width: 90vw; }
.sv-emoji { font-size: 120px; }
.sv-text { font-size: 24px; font-weight: 800; margin: 20px 0; }
.sv-author { color: #94a3b8; }
.sv-nav { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; }
.sv-nav > div { flex: 1; cursor: pointer; }
</style>
</head>
<body>
<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">00o.uz</a>
    <ul class="nav-links">
      <li><a href="index.html">Bosh</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="stories.html" class="active">📖 Stories</a></li>
      <li><a href="reels.html">🎬 Reels</a></li>
    </ul>
    <div style="display:flex;gap:8px;">
      <button class="btn-icon">🔔</button>
      <a href="profile.html" class="btn-icon">👤</a>
    </div>
  </div>
</nav>
<section class="st-hero container">
  <h1>📖 Stories</h1>
  <p>24 soat ichida yo'qoladigan hikoyalar</p>
</section>
<section class="container">
  <div class="story-row" id="storyRow"></div>
  <h2 style="margin:30px 0 16px">🔥 Mashhur</h2>
  <div class="story-row" id="trendingRow"></div>
</section>
<div class="story-viewer" id="viewer">
  <div class="sv-header">
    <div class="sv-progress" id="progress"></div>
    <button class="sv-close" onclick="closeStory()">×</button>
  </div>
  <div class="sv-content" id="content"></div>
  <div class="sv-nav"><div onclick="prev()"></div><div onclick="next()"></div></div>
</div>
<script src="/toast.js"></script>
<script src="/confetti.js"></script>
<script src="/animations.js"></script>
<script src="/sound-effects.js"></script>
<script>
const stories = [
  {name:'Jasur', emoji:'🚀', text:'Yangi startap! 1M+ user!', color:'linear-gradient(135deg,#8b5cf6,#ec4899)'},
  {name:'Madina', emoji:'🎨', text:'Yangi dizayn tizimi tayyor!', color:'linear-gradient(135deg,#06b6d4,#22c55e)'},
  {name:'Aziz', emoji:'💻', text:'Bugun 100 commit!', color:'linear-gradient(135deg,#f59e0b,#ef4444)'},
  {name:'Nilufar', emoji:'📚', text:'Yangi maqola yozdim', color:'linear-gradient(135deg,#ec4899,#8b5cf6)'},
  {name:'Ulug\'bek', emoji:'🤖', text:'AI model trained!', color:'linear-gradient(135deg,#3b82f6,#8b5cf6)'},
  {name:'Bobur', emoji:'💰', text:'Investitsiya qabul qilamiz', color:'linear-gradient(135deg,#22c55e,#06b6d4)'},
  {name:'Saida', emoji:'🎬', text:'Yangi video tayyor', color:'linear-gradient(135deg,#f97316,#fbbf24)'},
  {name:'Siz', emoji:'➕', text:'Yangi story yaratish', color:'linear-gradient(135deg,#64748b,#94a3b8)'},
];
let currentStory = 0, storyTimer;
function renderRow(el) {
  el.innerHTML = stories.map((s, i) => `
    <div class="story oo-anim fade-up" onclick="openStory(${i})">
      <div class="story-ring"><div class="story-avatar" style="background:${s.color}">${s.emoji}</div></div>
      <div class="story-name">${s.name}</div>
    </div>
  `).join('');
}
function openStory(i) {
  currentStory = i;
  const v = document.getElementById('viewer');
  v.classList.add('open');
  document.getElementById('progress').innerHTML = stories.map(() => '<div class="sv-prog"><div class="sv-prog-fill"></div></div>').join('');
  show();
  window.sfx?.notification();
}
function show() {
  const s = stories[currentStory];
  document.getElementById('content').innerHTML = `
    <div class="sv-emoji">${s.emoji}</div>
    <div class="sv-text">${s.text}</div>
    <div class="sv-author">${s.name} · ${Math.floor(Math.random()*23)+1} soat oldin</div>
  `;
  document.querySelectorAll('.sv-prog-fill').forEach((el, i) => {
    el.style.transition = 'none';
    el.style.width = i < currentStory ? '100%' : '0';
  });
  clearTimeout(storyTimer);
  setTimeout(() => {
    const fill = document.querySelectorAll('.sv-prog-fill')[currentStory];
    if (fill) { fill.style.transition = 'width 5s linear'; fill.style.width = '100%'; }
  }, 50);
  storyTimer = setTimeout(next, 5000);
}
function next() { currentStory = (currentStory + 1) % stories.length; show(); }
function prev() { currentStory = (currentStory - 1 + stories.length) % stories.length; show(); }
function closeStory() { document.getElementById('viewer').classList.remove('open'); clearTimeout(storyTimer); }
renderRow(document.getElementById('storyRow'));
renderRow(document.getElementById('trendingRow'));
</script>
</body>
</html>

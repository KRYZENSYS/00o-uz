<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Byudjet — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; padding: 100px 20px 60px; }
.container { max-width: 700px; margin: 0 auto; }
h1 { font-size: 32px; margin-bottom: 8px; text-align: center;
  background: linear-gradient(135deg, #22c55e, #10b981);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.tab { flex: 1; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.05); }
.tab.active { background: linear-gradient(135deg, #22c55e, #10b981); }
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
.s { padding: 16px; border-radius: 12px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); text-align: center; }
.s-n { font-size: 20px; font-weight: 800; }
.s-l { font-size: 11px; color: #94a3b8; }
.in { color: #22c55e; }
.out { color: #ef4444; }
.bar { padding: 16px; border-radius: 12px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); margin-bottom: 12px; }
.entry { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.03); margin-bottom: 6px; }
.e-i { font-size: 24px; }
.e-info { flex: 1; }
.e-n { font-weight: 600; }
.e-c { font-size: 11px; color: #94a3b8; }
.e-a { font-weight: 700; font-family: monospace; }
.add-btn { width: 100%; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, #22c55e, #10b981); color: white; border: none; font-weight: 700; cursor: pointer; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal-box { background: #0a0e1a; padding: 24px; border-radius: 16px; max-width: 400px; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
.modal h3 { margin-bottom: 16px; }
input, select { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
.btn { width: 100%; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, #22c55e, #10b981); color: white; border: none; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
.cancel { background: rgba(255,255,255,0.05); }
</style>
</head>
<body>
<div class="container">
  <h1>💰 Byudjet</h1>
  <div class="tabs">
    <div class="tab active" onclick="setTab('all', this)">📊 Hammasi</div>
    <div class="tab" onclick="setTab('in', this)">⬆️ Daromad</div>
    <div class="tab" onclick="setTab('out', this)">⬇️ Xarajat</div>
  </div>
  <div class="summary">
    <div class="s"><div class="s-n in" id="ti">0</div><div class="s-l">Daromad</div></div>
    <div class="s"><div class="s-n out" id="to">0</div><div class="s-l">Xarajat</div></div>
    <div class="s"><div class="s-n" id="tb">0</div><div class="s-l">Balans</div></div>
  </div>
  <div class="bar" id="entries"></div>
  <button class="add-btn" onclick="openM()">+ Yangi yozuv</button>
</div>
<div class="modal" id="m" style="display:none">
  <div class="modal-box">
    <h3 id="mt">Yangi yozuv</h3>
    <select id="mType"><option value="out">⬇️ Xarajat</option><option value="in">⬆️ Daromad</option></select>
    <select id="mCat">
      <optgroup label="Xarajat">
        <option>🍔 Ovqat</option><option>🚗 Transport</option><option>🛍 Xarid</option><option>💡 Kommunal</option><option>🎮 O'yin-kulgi</option><option>🏥 Sog'liq</option><option>📚 Ta'lim</option><option>💼 Boshqa</option>
      </optgroup>
      <optgroup label="Daromad">
        <option>💼 Maosh</option><option>💻 Freelance</option><option>📈 Investitsiya</option><option>🎁 Sovg'a</option>
      </optgroup>
    </select>
    <input type="number" id="mAmt" placeholder="Miqdor (so'm)">
    <input id="mNote" placeholder="Izoh (ixtiyoriy)">
    <button class="btn" onclick="add()">💾 Saqlash</button>
    <button class="btn cancel" onclick="closeM()">Bekor</button>
  </div>
</div>
<script>
let data = JSON.parse(localStorage.getItem('oo-budget') || '[]');
let tab = 'all';
function save() { localStorage.setItem('oo-budget', JSON.stringify(data)); render(); }
function setTab(t, el) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); el.classList.add('active'); tab=t; render(); }
function openM() { document.getElementById('m').style.display='flex'; }
function closeM() { document.getElementById('m').style.display='none'; }
function add() {
  const t = document.getElementById('mType').value;
  const c = document.getElementById('mCat').value;
  const a = parseFloat(document.getElementById('mAmt').value);
  const n = document.getElementById('mNote').value;
  if (!a) return;
  data.unshift({t, c, a, n, date: new Date().toISOString()});
  save(); closeM();
}
function del(i) { data.splice(i, 1); save(); }
function render() {
  const f = data.filter(d => tab==='all' || d.t===tab);
  const ti = data.filter(d=>d.t==='in').reduce((s,d)=>s+d.a,0);
  const to = data.filter(d=>d.t==='out').reduce((s,d)=>s+d.a,0);
  document.getElementById('ti').textContent = '+' + ti.toLocaleString('uz-UZ');
  document.getElementById('to').textContent = '-' + to.toLocaleString('uz-UZ');
  document.getElementById('tb').textContent = (ti-to).toLocaleString('uz-UZ');
  document.getElementById('entries').innerHTML = f.length ? f.map((d, i) => `<div class="entry">
    <div class="e-i">${d.c.split(' ')[0]}</div>
    <div class="e-info"><div class="e-n">${d.c}</div><div class="e-c">${new Date(d.date).toLocaleDateString('uz-UZ',{day:'numeric',month:'short'})}${d.n?' · '+d.n:''}</div></div>
    <div class="e-a ${d.t==='in'?'in':'out'}">${d.t==='in'?'+':'-'}${d.a.toLocaleString('uz-UZ')}</div>
    <button onclick="del(${i})" style="background:rgba(239,68,68,0.2);color:#fca5a5;border:none;width:28px;height:28px;border-radius:6px;cursor:pointer">×</button>
  </div>`).join('') : '<div style="text-align:center;color:#94a3b8;padding:30px">Yozuvlar yo\'q</div>';
}
render();
</script>
</body>
</html>

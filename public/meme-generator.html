<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Generator — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; padding: 100px 20px 60px; }
.container { max-width: 700px; margin: 0 auto; }
h1 { font-size: 32px; margin-bottom: 8px; text-align: center;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.templates { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin: 20px 0; }
.tmpl { aspect-ratio: 1; border-radius: 12px; cursor: pointer; overflow: hidden; border: 2px solid transparent; transition: 0.2s; }
.tmpl:hover, .tmpl.active { border-color: #8b5cf6; transform: scale(1.05); }
.tmpl-i { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 50px;
  background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.2)); }
.box { padding: 20px; border-radius: 16px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); }
input, textarea, select { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; }
.btn { width: 100%; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; font-weight: 700; cursor: pointer; }
.meme { background: black; border-radius: 12px; overflow: hidden; margin-top: 16px; position: relative; }
.meme-i { width: 100%; display: block; }
.meme-t { position: absolute; left: 50%; transform: translateX(-50%);
  font-family: Impact, sans-serif; font-size: 32px; font-weight: 900; color: white;
  -webkit-text-stroke: 2px black; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
  text-align: center; width: 90%; }
.meme-t.top { top: 10px; }
.meme-t.bot { bottom: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>😂 Meme Generator</h1>
  <p style="color:#94a3b8;text-align:center;margin-bottom:20px">Qiziqarli memlar yarating</p>
  <div class="templates" id="tmpls"></div>
  <div class="box">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <input id="t1" placeholder="Yuqori matn" value="WHEN YOU">
      <input id="t2" placeholder="Pastki matn" value="SHIP CODE ON FRIDAY">
    </div>
    <select id="bgSel">
      <option value="rocket">🚀 Raketa</option>
      <option value="cat">🐱 Mushuk</option>
      <option value="fire">🔥 Olov</option>
      <option value="star">⭐ Yulduz</option>
      <option value="money">💰 Pul</option>
    </select>
    <button class="btn" onclick="gen()">✨ Yaratish</button>
    <div class="meme" id="meme">
      <div class="meme-i" id="mi" style="background:linear-gradient(135deg,#8b5cf6,#ec4899);height:300px;display:flex;align-items:center;justify-content:center;font-size:120px">🚀</div>
      <div class="meme-t top" id="mt1">WHEN YOU</div>
      <div class="meme-t bot" id="mt2">SHIP CODE ON FRIDAY</div>
    </div>
    <button class="btn" style="margin-top:12px;background:rgba(255,255,255,0.05)" onclick="dl()">⬇️ Yuklab olish</button>
  </div>
</div>
<script>
const t = {🚀:'🚀',🐱:'🐱',🔥:'🔥',⭐:'⭐',💰:'💰'};
const grads = {🚀:'linear-gradient(135deg,#8b5cf6,#ec4899)',🐱:'linear-gradient(135deg,#f59e0b,#ef4444)',🔥:'linear-gradient(135deg,#ef4444,#fbbf24)',⭐:'linear-gradient(135deg,#3b82f6,#8b5cf6)',💰:'linear-gradient(135deg,#22c55e,#fbbf24)'};
function init() { document.getElementById('tmpls').innerHTML = Object.entries(t).map(([e]) => `<div class="tmpl" onclick="sel('${e}', this)"><div class="tmpl-i">${e}</div></div>`).join(''); }
let cur = '🚀';
function sel(e, el) { document.querySelectorAll('.tmpl').forEach(x=>x.classList.remove('active')); el.classList.add('active'); cur = e; gen(); }
function gen() {
  document.getElementById('mi').style.background = grads[cur];
  document.getElementById('mi').textContent = cur;
  document.getElementById('mt1').textContent = document.getElementById('t1').value.toUpperCase();
  document.getElementById('mt2').textContent = document.getElementById('t2').value.toUpperCase();
}
function dl() {
  // Use html2canvas-like approach
  const canvas = document.createElement('canvas');
  canvas.width = 600; canvas.height = 600;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 600, 600);
  grad.addColorStop(0, '#8b5cf6'); grad.addColorStop(1, '#ec4899');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 600, 600);
  ctx.font = '200px serif'; ctx.textAlign = 'center'; ctx.fillText(cur, 300, 380);
  ctx.font = 'bold 36px Impact, sans-serif'; ctx.fillStyle = 'white'; ctx.strokeStyle = 'black'; ctx.lineWidth = 4;
  ctx.textAlign = 'center';
  const t1 = document.getElementById('t1').value.toUpperCase();
  const t2 = document.getElementById('t2').value.toUpperCase();
  ctx.strokeText(t1, 300, 60); ctx.fillText(t1, 300, 60);
  ctx.strokeText(t2, 300, 560); ctx.fillText(t2, 300, 560);
  const a = document.createElement('a');
  a.download = 'meme-' + Date.now() + '.png'; a.href = canvas.toDataURL(); a.click();
}
document.getElementById('t1').oninput = gen;
document.getElementById('t2').oninput = gen;
init(); gen();
</script>
</body>
</html>

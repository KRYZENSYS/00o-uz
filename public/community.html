<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community — 00o.uz</title>
<link rel="manifest" href="/manifest.json">
<script src="/toast.js"></script>
<script src="/confetti.js"></script>
<script src="/animations.js"></script>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; }
.container { max-width: 700px; margin: 0 auto; padding: 0 20px; }
nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,14,26,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; padding: 12px 0; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.composer { margin: 80px 0 16px; padding: 16px; border-radius: 16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.06); display: flex; gap: 12px; }
.composer input { flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px; color: white; font-size: 13px; outline: none; }
.composer button { padding: 8px 20px; border-radius: 100px; border: none;
  background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; font-weight: 700; cursor: pointer; }
.post { padding: 18px; border-radius: 16px; margin-bottom: 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.06); }
.post-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #ec4899);
  display: flex; align-items: center; justify-content: center; font-size: 20px; }
.post-name { font-weight: 700; }
.post-time { color: #94a3b8; font-size: 12px; }
.post-text { line-height: 1.6; margin-bottom: 12px; }
.post-actions { display: flex; gap: 20px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.05); }
.act { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #94a3b8; font-size: 13px; transition: 0.2s; }
.act:hover { color: #ec4899; }
.act.liked { color: #ef4444; }
</style>
</head>
<body>
<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">00o.uz</a>
    <div style="display:flex;gap:6px">
      <a href="ai-chat.html" style="padding:6px 10px;background:rgba(255,255,255,0.05);border-radius:6px;text-decoration:none;color:white;font-size:12px">🤖</a>
      <a href="profile.html" style="padding:6px 10px;background:rgba(255,255,255,0.05);border-radius:6px;text-decoration:none;color:white;font-size:12px">👤</a>
    </div>
  </div>
</nav>
<div class="container">
  <div class="composer">
    <input id="postIn" placeholder="Bugun nima bilan shug'ullanyapsiz?">
    <button onclick="addPost()">Post</button>
  </div>
  <div id="feed"></div>
</div>
<script>
const posts = [
  {n:'Jasur', t:'🚀 Yangi startap ishga tushdi! 1 haftada 1000+ user!', time:'2 soat oldin', likes:124, comments:23, emoji:'👨‍🚀'},
  {n:'Madina', t:'🎨 Yangi dizayn tizimi tayyor! Glassmorphism + animatsiyalar. Baholab bering ✨', time:'4 soat oldin', likes:89, comments:15, emoji:'👩‍🎨'},
  {n:'Aziz', t:'💻 Bugun 100 commit qildim! Github yashil maydon 🎉\n\n#developer #coding', time:'6 soat oldin', likes:234, comments:42, emoji:'👨‍💻'},
  {n:'Nilufar', t:'📚 Yangi maqola yozdim: "AI bilan 1 kunda startap yaratish"\n\nManba: blog.00o.uz', time:'8 soat oldin', likes:567, comments:89, emoji:'👩‍🎓'},
  {n:'Bobur', t:'💰 Birinchi investitsiya oldim! 50K dollar. Hammaga maslahatim: persistent bo\'ling!', time:'1 kun oldin', likes:1240, comments:234, emoji:'👨‍💼'},
  {n:'Saida', t:'🎬 Yangi video: "00o.uz v2.0 - 100+ yangi feature!"\n\nYouTube: oo.uz/video', time:'1 kun oldin', likes:892, comments:156, emoji:'👩‍🎬'},
];
function render() {
  document.getElementById('feed').innerHTML = posts.map((p, i) => `
    <div class="post oo-anim fade-up" style="animation-delay:${i*0.05}s">
      <div class="post-head">
        <div class="avatar">${p.emoji}</div>
        <div><div class="post-name">${p.n}</div><div class="post-time">${p.time}</div></div>
      </div>
      <div class="post-text">${p.t}</div>
      <div class="post-actions">
        <div class="act" onclick="like(this, ${p.likes})">❤️ <span>${p.likes}</span></div>
        <div class="act">💬 <span>${p.comments}</span></div>
        <div class="act">📤 Ulashish</div>
        <div class="act">🔖 Saqlash</div>
      </div>
    </div>
  `).join('');
}
function like(el, n) {
  el.classList.toggle('liked');
  el.querySelector('span').textContent = el.classList.contains('liked') ? n+1 : n;
  if (el.classList.contains('liked')) window.confetti && window.confetti({count:30, x:el.getBoundingClientRect().x, y:el.getBoundingClientRect().y});
}
function addPost() {
  const t = document.getElementById('postIn').value.trim();
  if (!t) return;
  posts.unshift({n:'Siz', t, time:'Hozir', likes:0, comments:0, emoji:'👤'});
  document.getElementById('postIn').value = '';
  render();
  window.toast && window.toast.success('Post chop etildi!', '✓');
}
render();
</script>
</body>
</html>

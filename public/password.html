<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Parol generatori — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:720px;margin:0 auto}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.bar{padding:16px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
.out{padding:18px;border-radius:12px;background:rgba(0,0,0,0.4);font-family:ui-monospace,monospace;font-size:18px;word-break:break-all;text-align:center;letter-spacing:1px;min-height:60px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.1)}
label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:#cbd5e1}
label span:last-child{color:#8b5cf6;font-weight:700}
input[type=range]{width:100%;margin-bottom:14px}
input[type=checkbox]{width:18px;height:18px}
.chk{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer}
button{padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;font-size:15px;width:100%;margin-top:6px}
button:active{transform:scale(0.97)}
button.s{background:rgba(255,255,255,0.05);margin-top:8px}
.row{display:flex;gap:8px}
.row button{flex:1;margin-top:8px}
.strength{margin-top:8px;height:6px;border-radius:100px;background:rgba(255,255,255,0.05);overflow:hidden}
.strength-bar{height:100%;transition:width 0.3s, background 0.3s}
.hist-item{padding:10px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:6px;font-family:ui-monospace,monospace;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px;word-break:break-all}
.hist-pw{flex:1;color:#cbd5e1}
</style>
</head>
<body>
<h1>🔐 Parol generatori</h1>
<p class="sub">Kuchli va xavfsiz parollar yarating</p>
<div class="bar">
  <div class="out" id="out">—</div>
  <div class="strength" style="margin-top:10px"><div class="strength-bar" id="sb" style="width:0%;background:#ef4444"></div></div>
  <div style="text-align:right;font-size:12px;color:#94a3b8;margin-top:4px" id="sl">Kuchsiz</div>
  <label>Uzunlik: <span id="lv">16</span></label>
  <input type="range" id="len" min="6" max="64" value="16" oninput="upd()">
  <div class="chk"><input type="checkbox" id="u" checked onchange="upd()"><label for="u" style="margin:0">Katta harflar (A-Z)</label></div>
  <div class="chk"><input type="checkbox" id="l" checked onchange="upd()"><label for="l" style="margin:0">Kichik harflar (a-z)</label></div>
  <div class="chk"><input type="checkbox" id="n" checked onchange="upd()"><label for="n" style="margin:0">Raqamlar (0-9)</label></div>
  <div class="chk"><input type="checkbox" id="s" checked onchange="upd()"><label for="s" style="margin:0">Maxsus belgilar (!@#)</label></div>
  <div class="row">
    <button class="s" onclick="cp()">📋 Nusxa</button>
    <button onclick="gen()">🎲 Yaratish</button>
  </div>
  <button class="s" onclick="save()">💾 Saqlash</button>
</div>
<div class="bar">
  <h3 style="margin-bottom:10px;font-size:15px">📚 Tarix</h3>
  <div id="hist"></div>
</div>
<script>
var hist = oo.load('pw-hist', []);
function pick(chars){ return chars.charAt(Math.floor(Math.random()*chars.length)); }
function gen(){
  var len = +document.getElementById('len').value;
  var sets = [];
  if (document.getElementById('u').checked) sets.push('ABCDEFGHIJKLMNOPQRSTUVWXYZ');
  if (document.getElementById('l').checked) sets.push('abcdefghijklmnopqrstuvwxyz');
  if (document.getElementById('n').checked) sets.push('0123456789');
  if (document.getElementById('s').checked) sets.push('!@#$%^&*()_+-=[]{}|;:,.<>?');
  if (!sets.length) { toast.error('Kamida 1 ta turni tanlang'); return; }
  var all = sets.join('');
  var pw = sets.map(pick).join('');
  while (pw.length < len) pw += pick(all);
  pw = pw.split('').sort(function(){return Math.random()-0.5;}).join('').slice(0, len);
  document.getElementById('out').textContent = pw;
  document.getElementById('lv').textContent = len;
  strength(pw);
  window._pw = pw;
}
function strength(pw){
  var s = 0;
  if (pw.length >= 8) s += 25; if (pw.length >= 12) s += 15; if (pw.length >= 16) s += 10;
  if (/[A-Z]/.test(pw)) s += 15; if (/[a-z]/.test(pw)) s += 10;
  if (/[0-9]/.test(pw)) s += 15; if (/[^A-Za-z0-9]/.test(pw)) s += 20;
  s = Math.min(100, s);
  var b = document.getElementById('sb');
  var l = document.getElementById('sl');
  b.style.width = s+'%';
  b.style.background = s<40?'#ef4444':s<70?'#fbbf24':'#22c55e';
  l.textContent = s<40?'Kuchsiz':s<70?'O\'rtacha':'Kuchli 💪';
  l.style.color = s<40?'#ef4444':s<70?'#fbbf24':'#22c55e';
}
function upd(){
  document.getElementById('lv').textContent = document.getElementById('len').value;
  gen();
}
function cp(){
  if (!window._pw) return;
  try { navigator.clipboard.writeText(window._pw); toast.success('Nusxalandi!'); }
  catch(e){ toast.error('Nusxab olishda xato'); }
}
function save(){
  if (!window._pw) return;
  hist.unshift({p: window._pw, t: Date.now()});
  hist = hist.slice(0, 10);
  oo.save('pw-hist', hist);
  toast.success('Saqlandi'); renderHist();
}
function renderHist(){
  document.getElementById('hist').innerHTML = hist.length ? hist.map(function(h, i){
    return '<div class="hist-item"><div class="hist-pw">'+h.p+'</div><button class="s" style="width:auto;padding:4px 10px;margin:0" onclick="cpHist('+i+')">📋</button><button class="s" style="width:auto;padding:4px 10px;margin:0;background:rgba(239,68,68,0.2)" onclick="delHist('+i+')">×</button></div>';
  }).join('') : '<div style="color:#64748b;text-align:center;padding:20px">Tarix bo\'sh</div>';
}
function cpHist(i){ try { navigator.clipboard.writeText(hist[i].p); toast.success('Nusxalandi!'); } catch(e){} }
function delHist(i){ hist.splice(i,1); oo.save('pw-hist', hist); renderHist(); }
gen(); renderHist();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parol generator — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; padding: 100px 20px; }
.container { max-width: 600px; margin: 0 auto; }
h1 { font-size: 32px; margin-bottom: 8px; text-align: center;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.box { padding: 24px; border-radius: 16px; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.06); }
.out { padding: 20px; border-radius: 12px; background: rgba(0,0,0,0.4); font-family: monospace; font-size: 18px; word-break: break-all; min-height: 60px; margin-bottom: 16px; border: 2px solid #8b5cf6; }
.opt { margin: 12px 0; display: flex; justify-content: space-between; align-items: center; }
.opt label { font-size: 14px; }
.toggle { width: 44px; height: 24px; border-radius: 12px; background: rgba(255,255,255,0.1); position: relative; cursor: pointer; }
.toggle::after { content:''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: white; transition: 0.2s; }
.toggle.on { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
.toggle.on::after { left: 22px; }
input[type=range] { width: 200px; }
input[type=number] { width: 60px; padding: 6px; border-radius: 6px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); }
.btn { width: 100%; padding: 14px; border-radius: 10px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; font-weight: 700; cursor: pointer; }
.strength { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.1); overflow: hidden; margin-top: 8px; }
.strength-fill { height: 100%; transition: 0.3s; }
.hist { margin-top: 20px; }
.hist-item { display: flex; justify-content: space-between; padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.03); margin-bottom: 4px; font-family: monospace; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1>🔐 Parol generator</h1>
  <p style="color:#94a3b8;text-align:center;margin-bottom:20px">Xavfsiz va kuchli parollar yarating</p>
  <div class="box">
    <div class="out" id="out">K8$mPx2vL#9qWeR</div>
    <div class="strength"><div class="strength-fill" id="sf"></div></div>
    <div style="text-align:right;font-size:12px;margin-top:4px" id="sl"></div>
    <div class="opt">
      <label>Uzunlik: <span id="lbl">16</span></label>
      <input type="range" id="len" min="6" max="64" value="16" oninput="document.getElementById('lbl').textContent=this.value;gen()">
    </div>
    <div class="opt"><label>Uppercase (A-Z)</label><div class="toggle on" onclick="this.classList.toggle('on');gen()"></div></div>
    <div class="opt"><label>Lowercase (a-z)</label><div class="toggle on" onclick="this.classList.toggle('on');gen()"></div></div>
    <div class="opt"><label>Raqamlar (0-9)</label><div class="toggle on" onclick="this.classList.toggle('on');gen()"></div></div>
    <div class="opt"><label>Belgilar (!@#)</label><div class="toggle on" onclick="this.classList.toggle('on');gen()"></div></div>
    <button class="btn" onclick="gen()">🔄 Yangi parol</button>
    <button class="btn" style="margin-top:8px;background:rgba(255,255,255,0.05)" onclick="copy()">📋 Nusxa olish</button>
    <div class="hist" id="hist"></div>
  </div>
</div>
<script>
const hist = [];
function gen() {
  let chars = '';
  if (document.querySelectorAll('.toggle.on')[0]) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (document.querySelectorAll('.toggle.on')[1]) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (document.querySelectorAll('.toggle.on')[2]) chars += '0123456789';
  if (document.querySelectorAll('.toggle.on')[3]) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
  const len = parseInt(document.getElementById('len').value);
  let pwd = '';
  for (let i = 0; i < len; i++) pwd += chars[Math.floor(Math.random()*chars.length)];
  document.getElementById('out').textContent = pwd;
  hist.unshift(pwd);
  if (hist.length > 5) hist.pop();
  renderHist();
  strength(pwd);
}
function strength(p) {
  let s = 0;
  if (p.length >= 8) s++; if (p.length >= 12) s++; if (p.length >= 16) s++;
  if (/[a-z]/.test(p) && /[A-Z]/.test(p)) s++;
  if (/\d/.test(p)) s++;
  if (/[!@#$%^&*]/.test(p)) s++;
  const colors = ['#ef4444','#f59e0b','#fbbf24','#84cc16','#22c55e','#10b981'];
  const labels = ['Juda zaif','Zaif','O\'rta','Yaxshi','Kuchli','Juda kuchli'];
  document.getElementById('sf').style.width = (s/6*100) + '%';
  document.getElementById('sf').style.background = colors[s];
  document.getElementById('sl').textContent = labels[s];
}
function copy() {
  navigator.clipboard.writeText(document.getElementById('out').textContent);
  window.toast?.success('Nusxalandi!', '✓');
}
function renderHist() {
  document.getElementById('hist').innerHTML = hist.slice(1).map(p => `<div class="hist-item">${p.substring(0,30)}${p.length>30?'...':''}</div>`).join('');
}
gen();
</script>
</body>
</html>

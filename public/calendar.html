<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Kalendar — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:720px;margin:0 auto}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.bar{padding:16px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.month{font-size:18px;font-weight:700;text-transform:capitalize}
.nav{background:rgba(255,255,255,0.05);border:none;color:white;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px}
.gw{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dn{text-align:center;padding:6px;font-size:11px;color:#94a3b8;font-weight:700}
.d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-size:14px;background:rgba(255,255,255,0.03);border:1px solid transparent;font-weight:600}
.d:hover{background:rgba(139,92,246,0.2)}
.d.m{color:#64748b}
.d.t{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white}
.d.h{color:#fca5a5;background:rgba(239,68,68,0.1)}
.events{padding:12px;border-radius:10px;background:rgba(255,255,255,0.03);margin-bottom:8px;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,0.05)}
.e-t{flex:1}
.e-n{font-weight:600;font-size:14px}
.e-d{font-size:11px;color:#94a3b8;margin-top:2px}
.e-dl{background:rgba(239,68,68,0.2);color:#fca5a5;width:28px;height:28px;border-radius:6px;border:none;cursor:pointer}
.add{display:flex;gap:6px;margin-top:8px}
.add input{flex:1;padding:10px;border-radius:8px;background:rgba(0,0,0,0.4);color:white;border:1px solid rgba(255,255,255,0.1);font-size:14px}
.add input:focus{outline:none;border-color:#8b5cf6}
.add button{padding:10px 16px;border-radius:8px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<h1>📅 Kalendar</h1>
<p class="sub" id="sub">Voqealar va eslatmalar</p>
<div class="bar">
  <div class="head">
    <button class="nav" onclick="ch(-1)">‹</button>
    <div class="month" id="mt"></div>
    <button class="nav" onclick="ch(1)">›</button>
  </div>
  <div class="gw">
    <div class="dn">Ya</div><div class="dn">Du</div><div class="dn">Se</div><div class="dn">Ch</div><div class="dn">Pa</div><div class="dn">Ju</div><div class="dn">Sh</div>
  </div>
  <div class="gw" id="days" style="margin-top:4px"></div>
</div>
<div class="bar">
  <h3 style="font-size:15px;margin-bottom:10px">📌 Voqealar · <span id="sel">bugun</span></h3>
  <div class="add">
    <input id="ei" placeholder="Yangi voqea..." maxlength="100">
    <button onclick="addE()">+</button>
  </div>
  <div id="elist" style="margin-top:8px"></div>
</div>
<script>
var cur=new Date();
var sel=new Date();
var evs=oo.load('calendar',{});
function key(d){ return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function save(){ oo.save('calendar', evs); }
function render(){
  var y=cur.getFullYear(), m=cur.getMonth();
  document.getElementById('mt').textContent=new Date(y,m).toLocaleDateString('uz-UZ',{month:'long',year:'numeric'});
  var first=new Date(y,m,1).getDay();
  var days=new Date(y,m+1,0).getDate();
  var prev=new Date(y,m,0).getDate();
  var html='';
  var start=(first+6)%7; // Monday start
  for(var i=0;i<start;i++) html+='<div class="d m">'+(prev-start+i+1)+'</div>';
  for(var i=1;i<=days;i++){
    var d=new Date(y,m,i);
    var k=key(d);
    var today=d.toDateString()===new Date().toDateString();
    var selD=d.toDateString()===sel.toDateString();
    var h=evs[k]?' h':'';
    var cls='d'+(today?' t':'')+(selD?' s':'')+h;
    html+='<div class="'+cls+'" onclick="pick('+y+','+m+','+i+')">'+i+'</div>';
  }
  var rem=7-((start+days)%7);
  if(rem<7) for(var i=1;i<=rem;i++) html+='<div class="d m">'+i+'</div>';
  document.getElementById('days').innerHTML=html;
  document.getElementById('sel').textContent=sel.toLocaleDateString('uz-UZ',{day:'numeric',month:'long'});
  renderE();
}
function ch(n){ cur.setMonth(cur.getMonth()+n); render(); }
function pick(y,m,d){ sel=new Date(y,m,d); render(); }
function renderE(){
  var k=key(sel);
  var list=evs[k]||[];
  document.getElementById('elist').innerHTML=list.length?list.map(function(e,i){
    return '<div class="events"><div style="font-size:24px">📌</div><div class="e-t"><div class="e-n">'+escape(e)+'</div></div><button class="e-dl" onclick="delE('+i+')">×</button></div>';
  }).join(''):'<div style="text-align:center;color:#64748b;padding:20px">Voqealar yo\'q</div>';
  document.getElementById('sub').textContent=Object.keys(evs).length+' ta kun uchun voqealar';
}
function escape(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function addE(){
  var v=document.getElementById('ei').value.trim();
  if(!v) return;
  var k=key(sel);
  evs[k]=evs[k]||[];
  evs[k].push(v);
  document.getElementById('ei').value='';
  save(); render();
  toast.success('Voqea qo\'shildi');
}
function delE(i){
  var k=key(sel);
  evs[k].splice(i,1);
  if(!evs[k].length) delete evs[k];
  save(); render();
}
document.getElementById('ei').addEventListener('keypress',function(e){if(e.key==='Enter')addE();});
render();
</script>
</body>
</html>

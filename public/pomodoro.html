<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { text-align: center; width: 400px; max-width: 100%; }
h1 { font-size: 28px; margin-bottom: 8px; background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tabs { display: flex; gap: 6px; justify-content: center; margin: 20px 0; }
.tab { padding: 8px 16px; border-radius: 100px; background: rgba(255,255,255,0.05); cursor: pointer; font-size: 13px; }
.tab.active { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
.timer { position: relative; width: 280px; height: 280px; margin: 0 auto 24px; }
svg { transform: rotate(-90deg); width: 100%; height: 100%; }
circle.bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; }
circle.fg { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.time { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.t-min { font-size: 64px; font-weight: 800; font-family: monospace;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.t-l { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 4px; }
.controls { display: flex; gap: 8px; justify-content: center; }
.btn { padding: 12px 24px; border-radius: 100px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
.btn-p { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; }
.btn-s { background: rgba(255,255,255,0.05); color: white; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 24px; }
.s { padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); }
.s-n { font-size: 24px; font-weight: 800; }
.s-l { font-size: 11px; color: #94a3b8; }
</style>
</head>
<body>
<div class="box">
  <h1>🍅 Pomodoro</h1>
  <p style="color:#94a3b8">25 daqiqa ish, 5 daqiqa tanaffus</p>
  <div class="tabs">
    <div class="tab active" onclick="setMode('work', this)">📚 Ish</div>
    <div class="tab" onclick="setMode('short', this)">☕ Qisqa</div>
    <div class="tab" onclick="setMode('long', this)">🌴 Uzoq</div>
  </div>
  <div class="timer">
    <svg viewBox="0 0 100 100">
      <circle class="bg" cx="50" cy="50" r="45"></circle>
      <circle class="fg" cx="50" cy="50" r="45" id="ring"></circle>
    </svg>
    <div class="time"><div class="t-min" id="time">25:00</div><div class="t-l" id="lbl">ISH</div></div>
  </div>
  <div class="controls">
    <button class="btn btn-p" id="startBtn" onclick="toggle()">▶ Boshlash</button>
    <button class="btn btn-s" onclick="reset()">⟲ Reset</button>
  </div>
  <div class="stats">
    <div class="s"><div class="s-n" id="dToday">0</div><div class="s-l">Bugun</div></div>
    <div class="s"><div class="s-n" id="dTotal">0</div><div class="s-l">Jami</div></div>
    <div class="s"><div class="s-n" id="dTime">0m</div><div class="s-l">Vaqt</div></div>
  </div>
</div>
<script>
let mode='work', total=25*60, left=total, running=false, timer;
let completed = parseInt(localStorage.getItem('oo-pomo-done') || '0');
let todayCount = parseInt(localStorage.getItem('oo-pomo-today') || '0');
let todayDate = localStorage.getItem('oo-pomo-date');
if (todayDate !== new Date().toDateString()) { todayCount = 0; localStorage.setItem('oo-pomo-today', '0'); localStorage.setItem('oo-pomo-date', new Date().toDateString()); }
function setMode(m, el) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); el.classList.add('active'); mode=m; reset(); }
function reset() { running = false; clearInterval(timer); total = mode==='work'?25*60:mode==='short'?5*60:15*60; left = total; update(); }
function toggle() { running = !running; document.getElementById('startBtn').textContent = running ? '⏸ To\'xtatish' : '▶ Boshlash'; if (running) tick(); else clearInterval(timer); }
function tick() { timer = setInterval(() => { left--; if (left <= 0) { clearInterval(timer); running = false; completed++; todayCount++; localStorage.setItem('oo-pomo-done', completed); localStorage.setItem('oo-pomo-today', todayCount); if (mode==='work') { window.toast?.success('Ish tugadi! Tanaffus qiling', '🎉'); setMode('short', document.querySelectorAll('.tab')[1]); } else { window.toast?.success('Tanaffus tugadi!', '⏰'); setMode('work', document.querySelectorAll('.tab')[0]); } renderStats(); } update(); }, 1000); }
function update() {
  const m = Math.floor(left/60), s = left%60;
  document.getElementById('time').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const c = mode==='work'?'#ec4899':mode==='short'?'#22c55e':'#06b6d4';
  const ring = document.getElementById('ring');
  ring.style.stroke = c;
  const off = 283 - (283 * (total-left)/total);
  ring.setAttribute('stroke-dasharray', '283');
  ring.setAttribute('stroke-dashoffset', off);
  document.getElementById('lbl').textContent = mode==='work'?'ISH':mode==='short'?'TANAFFUS':'UZOQ';
  document.title = `${m}:${String(s).padStart(2,'0')} - Pomodoro`;
}
function renderStats() {
  document.getElementById('dToday').textContent = todayCount;
  document.getElementById('dTotal').textContent = completed;
  document.getElementById('dTime').textContent = (completed*25) + 'm';
}
renderStats(); update();
</script>
</body>
</html>

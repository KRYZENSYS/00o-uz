<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { text-align: center; }
h1 { font-size: 32px; margin-bottom: 8px; background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.s { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; font-family: monospace; }
.board { display: grid; grid-template-columns: repeat(4, 80px); gap: 8px; }
@media (max-width:480px) { .board { grid-template-columns: repeat(4, 65px); } }
.card { aspect-ratio: 1; border-radius: 10px; cursor: pointer; transition: 0.3s; transform-style: preserve-3d; position: relative; }
.card.flipped { transform: rotateY(180deg); }
.card .f, .card .b { position: absolute; inset: 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; backface-visibility: hidden; }
.card .f { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; font-size: 20px; }
.card .b { background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); transform: rotateY(180deg); border: 2px solid #8b5cf6; }
.card.matched .b { background: linear-gradient(135deg, #22c55e, #10b981); border-color: #22c55e; }
.b { padding: 10px 20px; border-radius: 100px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; font-weight: 700; cursor: pointer; margin-top: 16px; }
</style>
</head>
<body>
<div class="box">
  <h1>🎴 Memory</h1>
  <div class="s"><div>🎯 <span id="mv">0</span> urinish</div><div>⏱ <span id="tm">0</span>s</div><div>📈 <span id="bs">0</span> eng yaxshi</div></div>
  <div class="board" id="bd"></div>
  <button class="b" onclick="init()">🔄 Yangi</button>
</div>
<script>
const em = ['🍎','🍌','🍇','🍓','🍑','🥝','🍍','🥭'];
let cards, flipped, matched, moves, time, timer, best = parseInt(localStorage.getItem('oo-memory')||'0');
document.getElementById('bs').textContent = best;
function init() {
  const sel = em.slice(0, 8);
  cards = [...sel, ...sel].sort(() => Math.random() - 0.5).map((e, i) => ({e, i, m:false, f:false}));
  flipped = []; matched = 0; moves = 0; time = 0;
  document.getElementById('mv').textContent = 0; document.getElementById('tm').textContent = 0;
  clearInterval(timer);
  timer = setInterval(() => { time++; document.getElementById('tm').textContent = time; }, 1000);
  draw();
}
function draw() { document.getElementById('bd').innerHTML = cards.map((c, i) => `<div class="card ${c.m?'matched':''} ${c.f?'flipped':''}" onclick="click(${i})"><div class="f">?</div><div class="b">${c.e}</div></div>`).join(''); }
function click(i) {
  if (cards[i].m || cards[i].f || flipped.length === 2) return;
  cards[i].f = true; flipped.push(i); draw();
  if (flipped.length === 2) {
    moves++; document.getElementById('mv').textContent = moves;
    if (cards[flipped[0]].e === cards[flipped[1]].e) {
      cards[flipped[0]].m = cards[flipped[1]].m = true; matched += 2; flipped = [];
      window.confetti && window.confetti({count:30});
      if (matched === 16) { clearInterval(timer); const score = Math.max(0, 1000 - moves*5 - time*5); if (score > best) { best = score; localStorage.setItem('oo-memory', best); document.getElementById('bs').textContent = best; } window.toast?.success(`Tabriklayman! ${score} ball`, '🎉'); }
    } else { setTimeout(() => { flipped.forEach(j => cards[j].f = false); flipped = []; draw(); }, 800); }
  }
}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — 00o.uz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,14,26,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; padding: 16px 0; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.nav-links { display: flex; gap: 8px; list-style: none; }
.nav-links a { color: #cbd5e1; text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 8px; }
.nav-links a:hover { background: rgba(255,255,255,0.05); }
.nav-links a.active { background: linear-gradient(135deg, #06b6d4, #22c55e); }
.btn-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; }
.ev-hero { padding: 100px 0 20px; text-align: center; }
.ev-hero h1 { font-size: 40px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #06b6d4, #22c55e);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.filters { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 20px 0 30px; }
.filter { padding: 8px 16px; border-radius: 100px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 13px; }
.filter.active { background: linear-gradient(135deg, #06b6d4, #22c55e); border-color: transparent; }
.events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding-bottom: 60px; }
.event { padding: 0; border-radius: 18px; overflow: hidden; cursor: pointer;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.06); transition: 0.3s; }
.event:hover { transform: translateY(-4px); border-color: rgba(6,182,212,0.4); }
.event-cover { height: 140px; display: flex; align-items: center; justify-content: center;
  font-size: 60px; position: relative; }
.event-date { position: absolute; top: 12px; right: 12px; padding: 6px 12px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 8px;
  font-size: 12px; font-weight: 700; }
.event-body { padding: 18px; }
.event-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
.event-meta { display: flex; gap: 12px; color: #94a3b8; font-size: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.event-meta span { display: flex; align-items: center; gap: 4px; }
.event-footer { display: flex; justify-content: space-between; align-items: center; }
.event-attendees { display: flex; }
.event-attendees > div { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #0a0e1a;
  background: linear-gradient(135deg, #8b5cf6, #ec4899); margin-left: -8px;
  display: flex; align-items: center; justify-content: center; font-size: 12px; }
.event-attendees > div:first-child { margin-left: 0; }
.event-btn { padding: 8px 16px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #06b6d4, #22c55e); color: white; font-weight: 700; cursor: pointer; font-size: 13px; }
.event-btn.going { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.4); }
</style>
</head>
<body>
<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">00o.uz</a>
    <ul class="nav-links">
      <li><a href="index.html">Bosh</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="groups.html">Guruhlar</a></li>
      <li><a href="events.html" class="active">📅 Events</a></li>
    </ul>
    <div style="display:flex;gap:8px;">
      <button class="btn-icon">🔔</button>
      <a href="profile.html" class="btn-icon">👤</a>
    </div>
  </div>
</nav>
<section class="ev-hero container">
  <h1>📅 Tadbirlar</h1>
  <p>Konferentsiyalar, workshoplar, meetuplar</p>
</section>
<section class="container">
  <div class="filters">
    <div class="filter active" onclick="setFilter(this, 'all')">🌐 Hammasi</div>
    <div class="filter" onclick="setFilter(this, 'online')">💻 Online</div>
    <div class="filter" onclick="setFilter(this, 'offline')">📍 Ofline</div>
    <div class="filter" onclick="setFilter(this, 'free')">🆓 Bepul</div>
    <div class="filter" onclick="setFilter(this, 'workshop')">🛠 Workshop</div>
  </div>
  <div class="events-grid" id="grid"></div>
</section>
<script src="/toast.js"></script>
<script src="/sound-effects.js"></script>
<script>
const events = [
  {emoji:'🚀', title:'Toshkent Startup Summit 2026', date:'15 Iyul', time:'10:00', loc:'Toshkent', type:'offline', price:'Bepul', attendees:['👨','👩','👦'], cover:'linear-gradient(135deg,#8b5cf6,#ec4899)'},
  {emoji:'💻', title:'React Workshop: Advanced Hooks', date:'18 Iyul', time:'19:00', loc:'Online', type:'online', price:'$0', attendees:['👩','👦','👨','👧'], cover:'linear-gradient(135deg,#06b6d4,#3b82f6)'},
  {emoji:'🎨', title:'UI/UX Design Conference', date:'22 Iyul', time:'14:00', loc:'Toshkent', type:'offline', price:'50K', attendees:['👨','👩','👦','👧','👨'], cover:'linear-gradient(135deg,#f59e0b,#ef4444)'},
  {emoji:'🤖', title:'AI & ML Bootcamp', date:'25 Iyul', time:'20:00', loc:'Online', type:'online', price:'Bepul', attendees:['👩','👦','👨'], cover:'linear-gradient(135deg,#22c55e,#06b6d4)'},
  {emoji:'📱', title:'Mobile Dev Meetup', date:'28 Iyul', time:'18:00', loc:'Samarqand', type:'offline', price:'Bepul', attendees:['👨','👩','👦','👧','👨','👩'], cover:'linear-gradient(135deg,#3b82f6,#8b5cf6)'},
  {emoji:'💼', title:'Freelance Mastery Webinar', date:'30 Iyul', time:'16:00', loc:'Online', type:'online', price:'$10', attendees:['👨','👩','👦'], cover:'linear-gradient(135deg,#ec4899,#f59e0b)'},
];
let activeFilter = 'all';
function setFilter(el, f) {
  document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  activeFilter = f;
  render();
}
function render() {
  const list = events.filter(e => activeFilter === 'all' || e.type === activeFilter);
  document.getElementById('grid').innerHTML = list.map((e, i) => `
    <div class="event oo-anim fade-up" style="animation-delay:${i*0.05}s">
      <div class="event-cover" style="background:${e.cover}">
        <div class="event-date">${e.date}</div>
        <div style="font-size:80px">${e.emoji}</div>
      </div>
      <div class="event-body">
        <div class="event-title">${e.title}</div>
        <div class="event-meta">
          <span>🕐 ${e.time}</span>
          <span>📍 ${e.loc}</span>
          <span>💰 ${e.price}</span>
        </div>
        <div class="event-footer">
          <div class="event-attendees">${e.attendees.map(a => `<div>${a}</div>`).join('')}<div style="background:rgba(255,255,255,0.1)">+${50+i*15}</div></div>
          <button class="event-btn" onclick="join(event, this)">Qo'shilish</button>
        </div>
      </div>
    </div>
  `).join('');
}
function join(e, btn) {
  e.stopPropagation();
  window.sfx?.click();
  btn.classList.add('going');
  btn.textContent = '✓ Qatnashasiz';
  window.toast?.success('Tadbirga qo\'shildingiz!', '📅');
}
render();
</script>
</body>
</html>

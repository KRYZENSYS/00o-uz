<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { text-align: center; width: 400px; max-width: 100%; }
h1 { font-size: 48px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.s { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; }
.st { padding: 8px 16px; border-radius: 8px; background: rgba(255,255,255,0.05); font-family: monospace; }
.board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px;
  background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(236,72,153,0.1));
  border-radius: 12px; }
.cell { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 28px; background: rgba(255,255,255,0.05); transition: 0.2s; }
.c2 { background: #ede9fe; color: #5b21b6; }
.c4 { background: #ddd6fe; color: #5b21b6; }
.c8 { background: #c4b5fd; color: white; }
.c16 { background: #a78bfa; color: white; }
.c32 { background: #8b5cf6; color: white; }
.c64 { background: #7c3aed; color: white; }
.c128 { background: #6d28d9; color: white; font-size: 24px; }
.c256 { background: #5b21b6; color: white; font-size: 24px; }
.c512 { background: #4c1d95; color: white; font-size: 24px; }
.c1024 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; font-size: 20px; }
.c2048 { background: linear-gradient(135deg, #ec4899, #8b5cf6); color: white; font-size: 20px; box-shadow: 0 0 30px rgba(139,92,246,0.5); }
.b { padding: 10px 20px; border-radius: 100px; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; border: none; font-weight: 700; cursor: pointer; margin-top: 12px; }
</style>
</head>
<body>
<div class="box">
  <h1>2048</h1>
  <div class="s">
    <div class="st">🏆 <span id="sc">0</span></div>
    <div class="st">📈 <span id="bs">0</span></div>
  </div>
  <div class="board" id="bd"></div>
  <button class="b" onclick="init()">🔄 Yangi o'yin</button>
</div>
<script>
let board = [], score = 0, best = parseInt(localStorage.getItem('oo-2048')||'0');
document.getElementById('bs').textContent = best;
function init() { board = Array(4).fill().map(()=>Array(4).fill(0)); score=0; add(); add(); draw(); }
function add() { const e = []; for (let y=0;y<4;y++) for (let x=0;x<4;x++) if (!board[y][x]) e.push({x,y}); if (e.length) { const p = e[Math.floor(Math.random()*e.length)]; board[p.y][p.x] = Math.random()<0.9?2:4; } }
function draw() { document.getElementById('bd').innerHTML = board.flat().map(v => `<div class="cell ${v?'c'+v:''}">${v||''}</div>`).join(''); document.getElementById('sc').textContent = score; if (score>best) { best=score; localStorage.setItem('oo-2048', best); document.getElementById('bs').textContent=best; } }
function move(dir) {
  const rot = {up:0,right:1,down:2,left:3}[dir];
  for (let i=0;i<rot;i++) board = board[0].map((_,x) => board.map(r=>r[x]).reverse());
  let moved = false;
  for (let y=0;y<4;y++) {
    let r = board[y].filter(v=>v);
    for (let i=0;i<r.length-1;i++) if (r[i]===r[i+1]) { r[i]*=2; score+=r[i]; r.splice(i+1,1); }
    while (r.length<4) r.push(0);
    if (board[y].join()!==r.join()) moved = true;
    board[y] = r;
  }
  for (let i=0;i<4-rot;i++) board = board[0].map((_,x) => board.map(r=>r[x]).reverse());
  if (moved) { add(); draw(); if (board.flat().every(v=>v) && !canMove()) window.toast?.error('Game Over!'); }
}
function canMove() { for (let y=0;y<4;y++) for (let x=0;x<4;x++) if ((x<3&&board[y][x]===board[y][x+1]) || (y<3&&board[y][x]===board[y+1][x])) return true; return false; }
document.addEventListener('keydown', e => { if (e.key==='ArrowUp') move('up'); else if (e.key==='ArrowDown') move('down'); else if (e.key==='ArrowLeft') move('left'); else if (e.key==='ArrowRight') move('right'); });
init();
</script>
</body>
</html>

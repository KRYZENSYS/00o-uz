<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frilanserlar — 00o.uz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
  color: white; min-height: 100vh; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
nav { position: fixed; top: 0; left: 0; right: 0;
  background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100; padding: 16px 0; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.nav-links { display: flex; gap: 20px; list-style: none; align-items: center; }
.nav-links a { color: #cbd5e1; text-decoration: none; font-size: 14px; transition: 0.3s; }
.nav-links a:hover, .nav-links a.active { color: #8b5cf6; }
.btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
  border: none; transition: 0.3s; text-decoration: none; display: inline-block; font-size: 14px; }
.btn-primary { background: linear-gradient(135deg, #8b5cf6, #06b6d4); color: white; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(139,92,246,0.4); }
.page-hero { padding: 130px 0 40px; }
.page-hero h1 { font-size: clamp(36px, 5vw, 52px); font-weight: 800; margin-bottom: 12px;
  background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.page-hero p { color: #94a3b8; font-size: 18px; max-width: 600px; }
.search-bar { display: flex; gap: 12px; margin: 32px 0; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 250px; padding: 14px 20px; border-radius: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: white; font-size: 15px; }
.search-input:focus { outline: none; border-color: #8b5cf6; }
.search-select { padding: 14px 20px; border-radius: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: white; font-size: 15px; cursor: pointer; }
.freelancers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px; padding: 20px 0 80px; }
.freelancer-card { padding: 24px; border-radius: 20px;
  background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer; }
.freelancer-card:hover { transform: translateY(-6px); border-color: rgba(139,92,246,0.5);
  box-shadow: 0 20px 60px rgba(139,92,246,0.2); }
.avatar-row { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
.avatar { width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, #8b5cf6, #06b6d4); display: flex; align-items: center;
  justify-content: center; font-size: 32px; flex-shrink: 0; position: relative; }
.online-dot { position: absolute; bottom: 2px; right: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: #22c55e; border: 3px solid #0f172a; }
.freelancer-info { flex: 1; min-width: 0; }
.freelancer-name { font-size: 17px; font-weight: 700; margin-bottom: 2px;
  display: flex; align-items: center; gap: 6px; }
.pro-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white;
  font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 700; }
.freelancer-title { color: #94a3b8; font-size: 13px; }
.freelancer-rating { display: flex; align-items: center; gap: 4px; font-size: 13px; margin-top: 4px; }
.rating-stars { color: #f59e0b; }
.skills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.skill { padding: 4px 10px; border-radius: 12px; font-size: 11px;
  background: rgba(6, 182, 212, 0.15); color: #67e8f9; }
.price-row { display: flex; justify-content: space-between; align-items: center;
  padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); }
.price { font-size: 18px; font-weight: 700; color: #8b5cf6; }
.price-unit { font-size: 12px; color: #94a3b8; font-weight: 400; }
.btn-hire { padding: 8px 16px; border-radius: 8px;
  background: linear-gradient(135deg, #8b5cf6, #06b6d4); border: none;
  color: white; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-hire:hover { transform: translateY(-2px); }
.portfolio-link { display: block; text-align: center; padding: 10px; margin-top: 12px;
  background: rgba(255,255,255,0.05); border-radius: 8px; color: #c4b5fd; font-size: 13px; text-decoration: none; }
.portfolio-link:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>
<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">00o.uz</a>
    <ul class="nav-links">
      <li><a href="index.html">Bosh sahifa</a></li>
      <li><a href="startups.html">Startaplar</a></li>
      <li><a href="freelancers.html" class="active">Frilanserlar</a></li>
      <li><a href="jobs.html">Ish o'rinlari</a></li>
      <li><a href="premium.html">Premium</a></li>
      <li><a href="admin.html">📞</a></li>
    </ul>
    <a href="startups.html" class="btn btn-primary">Boshlash</a>
  </div>
</nav>
<section class="page-hero container">
  <h1>💼 Frilanserlar</h1>
  <p>O'zbekistondagi eng yaxshi frilanserlar. Tajribali mutaxassislar — IT, dizayn, marketing, kontent.</p>
  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Frilanser qidirish..." oninput="filterFreelancers()">
    <select class="search-select" id="catSelect" onchange="filterFreelancers()">
      <option value="all">Hammasi</option>
      <option value="developer">💻 Dasturchi</option>
      <option value="designer">🎨 Dizayner</option>
      <option value="marketing">📈 Marketing</option>
      <option value="content">✍️ Kontent</option>
    </select>
  </div>
</section>
<section class="container">
  <div class="freelancers-grid" id="grid"></div>
</section>
<script>
const freelancers = [
  { id: 1, name: 'Aziz Karimov', title: 'Full-stack Developer', cat: 'developer', avatar: '👨‍💻', skills: ['React', 'Node.js', 'Python', 'PostgreSQL'], rating: 4.9, reviews: 127, price: '25$', online: true, pro: true },
  { id: 2, name: 'Madina Yusupova', title: 'UI/UX Designer', cat: 'designer', avatar: '👩‍🎨', skills: ['Figma', 'Adobe XD', 'Sketch'], rating: 5.0, reviews: 89, price: '30$', online: true, pro: true },
  { id: 3, name: 'Bobur Aliyev', title: 'Digital Marketing', cat: 'marketing', avatar: '👨‍💼', skills: ['SEO', 'Google Ads', 'SMM'], rating: 4.8, reviews: 156, price: '20$', online: false, pro: true },
  { id: 4, name: 'Nilufar Saidova', title: 'Content Writer', cat: 'content', avatar: '👩‍💻', skills: ['Copywriting', 'SEO', 'SMM'], rating: 4.7, reviews: 64, price: '15$', online: true, pro: false },
  { id: 5, name: 'Sherzod Toshmatov', title: 'Mobile Developer', cat: 'developer', avatar: '👨‍🔧', skills: ['React Native', 'Flutter', 'iOS'], rating: 4.9, reviews: 92, price: '35$', online: true, pro: true },
  { id: 6, name: 'Dilshod Rahimov', title: 'Graphic Designer', cat: 'designer', avatar: '🧑‍🎨', skills: ['Photoshop', 'Illustrator', 'Branding'], rating: 4.6, reviews: 78, price: '18$', online: false, pro: false },
  { id: 7, name: 'Kamila Ergasheva', title: 'SMM Specialist', cat: 'marketing', avatar: '👩‍💼', skills: ['Instagram', 'TikTok', 'Telegram'], rating: 4.8, reviews: 113, price: '22$', online: true, pro: true },
  { id: 8, name: 'Jasur Nazarov', title: 'DevOps Engineer', cat: 'developer', avatar: '👨‍🔬', skills: ['Docker', 'K8s', 'AWS', 'CI/CD'], rating: 5.0, reviews: 41, price: '45$', online: true, pro: true },
  { id: 9, name: 'Saida Mahmudova', title: 'Video Editor', cat: 'content', avatar: '👩‍🎬', skills: ['Premiere', 'After Effects', 'DaVinci'], rating: 4.7, reviews: 58, price: '20$', online: false, pro: false },
  { id: 10, name: "Ulug'bek Sodiqov", title: 'Data Scientist', cat: 'developer', avatar: '🧑‍💻', skills: ['Python', 'ML', 'TensorFlow', 'Pandas'], rating: 4.9, reviews: 36, price: '40$', online: true, pro: true },
];
function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catSelect').value;
  const filtered = freelancers.filter(f => {
    const ms = f.name.toLowerCase().includes(search) || f.title.toLowerCase().includes(search) || f.skills.some(s => s.toLowerCase().includes(search));
    const mc = cat === 'all' || f.cat === cat;
    return ms && mc;
  });
  document.getElementById('grid').innerHTML = filtered.map(f => `
    <div class="freelancer-card">
      <div class="avatar-row">
        <div class="avatar">${f.avatar}${f.online ? '<div class="online-dot"></div>' : ''}</div>
        <div class="freelancer-info">
          <div class="freelancer-name">${f.name} ${f.pro ? '<span class="pro-badge">PRO</span>' : ''}</div>
          <div class="freelancer-title">${f.title}</div>
          <div class="freelancer-rating">
            <span class="rating-stars">${'⭐'.repeat(Math.floor(f.rating))}</span>
            <strong>${f.rating}</strong>
            <span style="color:#94a3b8">(${f.reviews} ta sharh)</span>
          </div>
        </div>
      </div>
      <div class="skills">${f.skills.map(s => `<span class="skill">${s}</span>`).join('')}</div>
      <div class="price-row">
        <div class="price">${f.price}<span class="price-unit"> / soat</span></div>
        <button class="btn-hire" onclick="alert('Demo: ${f.name} bilan bog\\'lanish')">Yollash →</button>
      </div>
      <a href="#" class="portfolio-link" onclick="event.preventDefault();alert('Portfolio demo')">📁 Portfolio ko'rish</a>
    </div>
  `).join('') || '<p style="color:#94a3b8;grid-column:1/-1;text-align:center;padding:40px;">Hech kim topilmadi</p>';
}
function filterFreelancers() { render(); }
render();
</script>
<script src="/i18n.js"></script>
</body>
</html>

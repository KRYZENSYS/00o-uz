<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>UUID Generator — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:720px;margin:0 auto}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.bar{padding:16px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
label{flex:1;font-size:13px;color:#cbd5e1}
input[type=number]{width:70px;padding:8px;border-radius:8px;background:rgba(0,0,0,0.4);color:white;border:1px solid rgba(255,255,255,0.1);text-align:center;font-size:15px}
button{padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;font-size:15px;width:100%;margin-top:8px}
button.s{background:rgba(255,255,255,0.05)}
.id-item{padding:10px 12px;border-radius:8px;background:rgba(0,0,0,0.3);font-family:ui-monospace,monospace;font-size:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;word-break:break-all;border:1px solid rgba(255,255,255,0.05)}
.id-text{flex:1;color:#a5f3fc}
.cp-btn{background:rgba(139,92,246,0.2);color:#c4b5fd;width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;flex-shrink:0}
.tabs{display:flex;gap:4px;margin-bottom:8px;background:rgba(255,255,255,0.03);padding:4px;border-radius:10px}
.tab{flex:1;padding:8px;border-radius:8px;text-align:center;cursor:pointer;font-size:12px;color:#94a3b8}
.tab.act{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:700}
</style>
</head>
<body>
<h1>🔑 UUID Generator</h1>
<p class="sub">UUID v4 va boshqa identifikatorlar</p>
<div class="bar">
  <div class="row"><label>Soni:</label><input type="number" id="cnt" value="5" min="1" max="50"></div>
  <div class="row">
    <label>Bosh harf:</label>
    <input type="checkbox" id="up" style="width:20px;height:20px">
  </div>
  <div class="tabs">
    <div class="tab act" onclick="setT('uuid',this)">UUID v4</div>
    <div class="tab" onclick="setT('hex',this)">HEX</div>
    <div class="tab" onclick="setT('nano',this)">Nano ID</div>
  </div>
  <button onclick="gen()">✨ Yaratish</button>
  <button class="s" onclick="cpAll()">📋 Hammasini nusxalash</button>
</div>
<div class="bar">
  <h3 style="margin-bottom:10px;font-size:15px">📋 Natijalar</h3>
  <div id="list"></div>
</div>
<script>
var type='uuid';
function setT(t,el){ type=t; document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act');}); el.classList.add('act'); }
function uuidv4(){
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  var b=new Uint8Array(16); crypto.getRandomValues(b);
  b[6]=(b[6]&0x0f)|0x40; b[8]=(b[8]&0x3f)|0x80;
  var h=''; for(var i=0;i<16;i++) h+=(b[i]+256).toString(16).slice(1);
  return h.slice(0,8)+'-'+h.slice(8,12)+'-'+h.slice(12,16)+'-'+h.slice(16,20)+'-'+h.slice(20);
}
function hex(){ var b=new Uint8Array(16); crypto.getRandomValues(b); var h=''; for(var i=0;i<16;i++) h+=(b[i]+256).toString(16).padStart(2,'0'); return h; }
function nano(){ var c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-'; var id=''; var b=new Uint8Array(21); crypto.getRandomValues(b); for(var i=0;i<21;i++) id+=c[b[i]%c.length]; return id; }
function fmt(s){
  if (type==='uuid') return s;
  if (type==='hex') return document.getElementById('up').checked ? s.toUpperCase() : s;
  if (type==='nano') return s;
  return s;
}
function gen(){
  var n=+document.getElementById('cnt').value; n=Math.max(1,Math.min(50,n));
  var arr=[];
  for(var i=0;i<n;i++){
    var v=type==='uuid'?uuidv4():type==='hex'?hex():nano();
    arr.push(fmt(v));
  }
  document.getElementById('list').innerHTML=arr.map(function(v,i){
    return '<div class="id-item"><div class="id-text">'+v+'</div><button class="cp-btn" onclick="cp(\''+v.replace(/'/g,"\\'")+'\')">📋</button></div>';
  }).join('');
  window._ids=arr;
  toast.success(n+' ta yaratildi');
}
function cp(v){ try{navigator.clipboard.writeText(v); toast.success('Nusxalandi!');}catch(e){toast.error('Xato');} }
function cpAll(){ if(!window._ids||!window._ids.length)return; cp(window._ids.join('\n')); }
gen();
</script>
</body>
</html>

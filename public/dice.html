<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice — 00o.uz</title>
<script src="/global.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.box { text-align: center; width: 500px; max-width: 100%; }
h1 { font-size: 40px; margin-bottom: 8px; background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.dice-area { display: flex; gap: 16px; justify-content: center; margin: 30px 0; perspective: 600px; min-height: 120px; }
.die { width: 100px; height: 100px; border-radius: 16px; background: white; display: grid;
  grid-template-columns: repeat(3, 1fr); padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  color: #1e1b4b; }
.die.rolling { animation: roll 0.6s ease-out; }
@keyframes roll { 0% { transform: rotateX(0) rotateY(0); } 100% { transform: rotateX(720deg) rotateY(720deg); } }
.dot { width: 14px; height: 14px; border-radius: 50%; background: #1e1b4b; align-self: center; justify-self: center; opacity: 0; }
.f1 .d1, .f3 .d1, .f5 .d1, .f3 .d3, .f5 .d3, .f5 .d5, .f3 .d5, .f1 .d3, .f1 .d5, .f1 .d9, .f3 .d9, .f5 .d9, .f5 .d7, .f3 .d7, .f5 .d7, .f1 .d7 { opacity: 1; }
.controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn { padding: 12px 24px; border-radius: 100px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; font-weight: 700; cursor: pointer; }
.history { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 6px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
.hd { padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.05); font-weight: 700; font-family: monospace; }
</style>
</head>
<body>
<div class="box">
  <h1>🎲 Dice</h1>
  <div style="color:#94a3b8">Tasodifiy sonlar generatori</div>
  <div class="dice-area" id="da"></div>
  <div class="controls">
    <button class="btn" onclick="roll(1)">1 zar</button>
    <button class="btn" onclick="roll(2)">2 zar</button>
    <button class="btn" onclick="roll(3)">3 zar</button>
    <button class="btn" onclick="roll(5)">5 zar</button>
  </div>
  <div style="margin-top:20px;text-align:left">
    <h3>📜 Tarix</h3>
    <div class="history" id="hd"></div>
  </div>
</div>
<script>
let history = [];
function face(n) {
  const f = {1:[5],2:[1,9],3:[1,5,9],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]}[n];
  let html = '';
  for (let i=1; i<=9; i++) html += `<div class="dot d${i}"></div>`;
  return `<div class="die f${n}">${html.replace(/d(\d+)/g, (m, x) => f.includes(parseInt(x)) ? 'd'+x : 'd'+x)}</div>`;
}
function roll(n) {
  const da = document.getElementById('da');
  da.innerHTML = Array(n).fill().map(() => face(Math.floor(Math.random()*6)+1)).join('');
  const dice = da.querySelectorAll('.die');
  dice.forEach(d => d.classList.add('rolling'));
  setTimeout(() => { dice.forEach(d => d.classList.remove('rolling')); }, 600);
  const sum = Array(dice.length).fill().reduce(() => 0) + Array.from(dice).map(d => parseInt(d.className.match(/f(\d)/)[1])).reduce((a,b)=>a+b, 0);
  if (sum > 0) { history.unshift(sum); history = history.slice(0, 30); render(); }
}
function render() { document.getElementById('hd').innerHTML = history.map(h => `<div class="hd">${h}</div>`).join(''); }
roll(2);
</script>
</body>
</html>

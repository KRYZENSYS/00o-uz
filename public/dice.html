<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Tasodifiy — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:720px;margin:0 auto}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,0.03);padding:4px;border-radius:10px;flex-wrap:wrap}
.tab{flex:1;min-width:80px;padding:8px 4px;border-radius:8px;text-align:center;cursor:pointer;font-size:12px;color:#94a3b8}
.tab.act{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:700}
.box{padding:24px;border-radius:20px;background:linear-gradient(135deg,rgba(139,92,246,0.15),rgba(236,72,153,0.05));border:1px solid rgba(139,92,246,0.2);text-align:center;margin-bottom:12px}
.result{font-size:64px;font-weight:800;background:linear-gradient(135deg,#fbbf24,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:ui-monospace,monospace;line-height:1;margin:8px 0;word-break:break-all}
.sub2{color:#cbd5e1;font-size:14px;margin:8px 0}
.row{display:flex;gap:6px;margin-bottom:8px}
.row > div{flex:1;padding:14px;border-radius:10px;background:rgba(255,255,255,0.05);text-align:center;font-size:18px;font-weight:700}
.bar{padding:14px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
label{display:flex;justify-content:space-between;font-size:13px;color:#cbd5e1;margin-bottom:4px}
input[type=number],input[type=range],textarea{width:100%;padding:10px;border-radius:8px;background:rgba(0,0,0,0.4);color:white;border:1px solid rgba(255,255,255,0.1);font-size:14px}
input[type=range]{padding:0;background:transparent;border:none}
textarea{min-height:80px;resize:vertical;font-family:inherit}
button{padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;width:100%;font-size:15px}
button:active{transform:scale(0.97)}
.hist-item{padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.03);margin-bottom:4px;font-size:13px;display:flex;justify-content:space-between}
</style>
</head>
<body>
<h1>🎲 Tasodifiy</h1>
<p class="sub">Raqam, tanga, ro'yxat, g'olib</p>
<div class="tabs">
  <div class="tab act" onclick="setT('dice',this)">🎲 Zar</div>
  <div class="tab" onclick="setT('coin',this)">🪙 Tanga</div>
  <div class="tab" onclick="setT('num',this)">🔢 Raqam</div>
  <div class="tab" onclick="setT('list',this)">📋 Ro'yxat</div>
  <div class="tab" onclick="setT('wheel',this)">🎡 G'olib</div>
</div>
<div id="out"></div>
<script>
var type='dice';
var hist=oo.load('random-hist',[]);
function setT(t,el){ type=t; document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act');}); el.classList.add('act'); render(); }
function saveH(s){ hist.unshift(s); hist=hist.slice(0,20); oo.save('random-hist',hist); }
function render(){
  var h='';
  if(type==='dice'){
    h='<div class="bar"><label>Yon: <span id="dl">2</span></label><input type="range" id="dv" min="1" max="10" value="2" oninput="document.getElementById(\'dl\').textContent=this.value"></div><div class="box"><div class="sub2">Natija:</div><div class="row" id="dr"></div></div><button onclick="rollDice()">🎲 Otish</button>';
  } else if(type==='coin'){
    h='<div class="box"><div class="sub2">Natija:</div><div class="result" id="cr">?</div></div><button onclick="flip()">🪙 Tashlash</button>';
  } else if(type==='num'){
    h='<div class="bar"><div style="display:flex;gap:8px;margin-bottom:8px"><div style="flex:1"><label>Min</label><input type="number" id="mn" value="1"></div><div style="flex:1"><label>Max</label><input type="number" id="mx" value="100"></div></div><label>Soni: <span id="nl">1</span></label><input type="range" id="nv" min="1" max="20" value="1" oninput="document.getElementById(\'nl\').textContent=this.value"></div><div class="box"><div class="sub2">Natija:</div><div class="result" id="nr">—</div></div><button onclick="genNum()">🎲 Yaratish</button>';
  } else if(type==='list'){
    h='<div class="bar"><label>Elementlar (har qatorga 1 tadan):</label><textarea id="lt">Aliya\nBobur\nDilshod\nE\'zoza\nFarrux</textarea></div><div class="box"><div class="sub2">Tanlangan:</div><div class="result" id="lr">—</div></div><button onclick="pickList()">🎯 Tanlash</button>';
  } else if(type==='wheel'){
    h='<div class="bar"><label>Ishtirokchilar:</label><textarea id="wt">Ali\nVali\nSoli\nHasan\nHusan</textarea></div><div class="box"><div class="sub2">G\'olib:</div><div class="result" id="wr">—</div></div><button onclick="win()">🏆 Tanlash</button>';
  }
  h+='<div class="bar" style="margin-top:12px"><h3 style="font-size:14px;margin-bottom:8px">📜 Tarix</h3><div>'+hist.slice(0,10).map(function(h){return '<div class="hist-item"><span>'+h.t+'</span><span style="color:#8b5cf6;font-weight:700">'+h.r+'</span></div>';}).join('')+'</div></div>';
  document.getElementById('out').innerHTML=h;
}
function rollDice(){
  var n=+document.getElementById('dv').value; var arr=[];
  for(var i=0;i<n;i++) arr.push(Math.floor(Math.random()*6)+1);
  document.getElementById('dr').innerHTML=arr.map(function(d){return '<div>'+['⚀','⚁','⚂','⚃','⚄','⚅'][d-1]+'<div style="font-size:11px;color:#94a3b8">'+d+'</div></div>';}).join('');
  saveH({t:'Zar x'+n,r:arr.join(', ')}); render();
  window.confetti({count:30});
}
function flip(){
  var r=Math.random()<0.5?'Tosh 🪨':'Qaychi 📄'; // actually use heads/tails
  var h=Math.random()<0.5?'Ochiq 🦅':'Yashirin 🦉';
  document.getElementById('cr').textContent=h;
  saveH({t:'Tanga',r:h}); render();
}
function genNum(){
  var mn=+document.getElementById('mn').value, mx=+document.getElementById('mx').value;
  var n=+document.getElementById('nv').value;
  if(mn>=mx){toast.error('Min < Max bo\'lishi kerak');return;}
  var arr=[];
  for(var i=0;i<n;i++) arr.push(Math.floor(Math.random()*(mx-mn+1))+mn);
  document.getElementById('nr').textContent=arr.join(', ');
  saveH({t:'Raqam '+mn+'-'+mx,r:arr.join(',')}); render();
}
function pickList(){
  var v=document.getElementById('lt').value.split('\n').filter(function(s){return s.trim();});
  if(!v.length){toast.error('Ro\'yxat bo\'sh');return;}
  var p=v[Math.floor(Math.random()*v.length)];
  document.getElementById('lr').textContent=p;
  saveH({t:'Ro\'yxat ('+v.length+')',r:p}); render();
  window.confetti({count:30});
}
function win(){
  var v=document.getElementById('wt').value.split('\n').filter(function(s){return s.trim();});
  if(!v.length){toast.error('Ishtirokchilar yo\'q');return;}
  var p=v[Math.floor(Math.random()*v.length)];
  document.getElementById('wr').textContent=p;
  saveH({t:'G\'olib',r:p}); render();
  window.confetti({count:80});
}
render();
</script>
</body>
</html>

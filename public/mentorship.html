<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentorlik — 00o.uz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0e1a; color: white; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,14,26,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100; padding: 16px 0; }
.nav-inner { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
.nav-links { display: flex; gap: 8px; list-style: none; }
.nav-links a { color: #cbd5e1; text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 8px; }
.nav-links a:hover { background: rgba(255,255,255,0.05); }
.nav-links a.active { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
.btn-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; }
.m-hero { padding: 100px 0 20px; text-align: center; }
.m-hero h1 { font-size: 40px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #fbbf24, #f97316);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.mentors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px; padding-bottom: 60px; }
.mentor { padding: 24px; border-radius: 20px; text-align: center;
  background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.06); transition: 0.3s; position: relative; overflow: hidden; }
.mentor::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #fbbf24, #f59e0b); }
.mentor:hover { transform: translateY(-6px); border-color: rgba(251,191,36,0.4); }
.mentor-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px;
  background: linear-gradient(135deg, #fbbf24, #f97316);
  display: flex; align-items: center; justify-content: center; font-size: 40px;
  border: 3px solid rgba(251,191,36,0.3); }
.mentor-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.mentor-title { color: #fbbf24; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.mentor-bio { color: #94a3b8; font-size: 13px; line-height: 1.5; margin-bottom: 16px; min-height: 60px; }
.mentor-stats { display: flex; justify-content: space-around; padding: 12px 0;
  border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 16px; }
.mentor-stat-num { font-size: 18px; font-weight: 800; color: #fbbf24; }
.mentor-stat-label { font-size: 11px; color: #94a3b8; }
.mentor-skills { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  margin-bottom: 16px; min-height: 30px; }
.skill { padding: 4px 10px; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2);
  border-radius: 100px; font-size: 11px; color: #fbbf24; }
.mentor-btn { width: 100%; padding: 12px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #fbbf24, #f97316); color: #0a0e1a;
  font-weight: 800; cursor: pointer; font-size: 14px; transition: 0.2s; }
.mentor-btn:hover { transform: scale(1.02); box-shadow: 0 8px 24px rgba(251,191,36,0.4); }
.mentor-rate { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
.mentor-rate strong { color: #fbbf24; }
</style>
</head>
<body>
<nav>
  <div class="container nav-inner">
    <a href="index.html" class="logo">00o.uz</a>
    <ul class="nav-links">
      <li><a href="index.html">Bosh</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="mentorship.html" class="active">🎓 Mentor</a></li>
    </ul>
    <div style="display:flex;gap:8px;">
      <button class="btn-icon">🔔</button>
      <a href="profile.html" class="btn-icon">👤</a>
    </div>
  </div>
</nav>
<section class="m-hero container">
  <h1>🎓 Mentorlik</h1>
  <p>Tajribali mentorlar bilan o'sing · 1:1 sessiyalar</p>
</section>
<section class="container">
  <div class="mentors-grid" id="grid"></div>
</section>
<script src="/toast.js"></script>
<script src="/confetti.js"></script>
<script src="/sound-effects.js"></script>
<script>
const mentors = [
  {avatar:'👨‍💼', name:'Alisher Karimov', title:'Startup Founder & Investor', bio:'10 yil startap tajribasi. 50+ kompaniya ochgan.', sessions:284, students:1240, rating:4.9, rate:'500K/soat', skills:['Startup','Investitsiya','Strategy']},
  {avatar:'👩‍💻', name:'Nilufar Saidova', title:'Senior Software Engineer @ Google', bio:'Full-stack development va system design mutaxassisi.', sessions:412, students:2890, rating:5.0, rate:'800K/soat', skills:['React','Node.js','System Design']},
  {avatar:'👨‍🎨', name:'Bobur Ergashev', title:'Lead Product Designer @ Yandex', bio:'UX research va design systems bo\'yicha mutaxassis.', sessions:198, students:890, rating:4.8, rate:'600K/soat', skills:['UI/UX','Figma','Design System']},
  {avatar:'👩‍💼', name:'Saida Yusupova', title:'Marketing Director', bio:'Digital marketing va growth hacking mutaxassisi.', sessions:325, students:1567, rating:4.9, rate:'450K/soat', skills:['Marketing','SEO','Growth']},
  {avatar:'👨‍💻', name:'Jasur Toshmatov', title:'AI/ML Engineer @ Meta', bio:'Machine learning va data science bo\'yicha tajribali.', sessions:267, students:1890, rating:4.9, rate:'700K/soat', skills:['AI/ML','Python','TensorFlow']},
  {avatar:'👩‍🎓', name:'Madina Rahimova', title:'Product Manager @ Stripe', bio:'Product strategy va user research mutaxassisi.', sessions:189, students:734, rating:4.7, rate:'550K/soat', skills:['Product','Analytics','UX']},
];
function render() {
  document.getElementById('grid').innerHTML = mentors.map((m, i) => `
    <div class="mentor oo-anim fade-up" style="animation-delay:${i*0.05}s">
      <div class="mentor-avatar">${m.avatar}</div>
      <div class="mentor-name">${m.name}</div>
      <div class="mentor-title">${m.title}</div>
      <div class="mentor-bio">${m.bio}</div>
      <div class="mentor-stats">
        <div><div class="mentor-stat-num">${m.sessions}</div><div class="mentor-stat-label">Sessiyalar</div></div>
        <div><div class="mentor-stat-num">${m.students}</div><div class="mentor-stat-label">O'quvchilar</div></div>
        <div><div class="mentor-stat-num">⭐ ${m.rating}</div><div class="mentor-stat-label">Reyting</div></div>
      </div>
      <div class="mentor-skills">${m.skills.map(s => `<div class="skill">${s}</div>`).join('')}</div>
      <div class="mentor-rate"><strong>${m.rate}</strong></div>
      <button class="mentor-btn" onclick="book('${m.name}')">📅 Band qilish</button>
    </div>
  `).join('');
}
function book(name) {
  window.sfx?.click();
  window.confetti({count:80});
  window.toast?.success(`${name} bilan sessiya band qilindi!`, '🎓 Mentor');
}
render();
</script>
</body>
</html>

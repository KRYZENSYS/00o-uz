<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>Kanban — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:100%}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px}
.tab{padding:8px 14px;border-radius:100px;background:rgba(255,255,255,0.05);cursor:pointer;font-size:13px;white-space:nowrap;border:1px solid rgba(255,255,255,0.05);color:#94a3b8}
.tab.act{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:700;border-color:transparent}
.cards{display:grid;gap:10px;grid-template-columns:1fr;max-width:600px;margin:0 auto}
.card{padding:14px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);border-left:4px solid #8b5cf6}
.card.todo{border-left-color:#94a3b8}
.card.doing{border-left-color:#fbbf24}
.card.done{border-left-color:#22c55e;opacity:0.7}
.card-text{font-size:14px;line-height:1.4;margin-bottom:8px;word-break:break-word}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#94a3b8}
.card-actions{display:flex;gap:4px}
.cb{background:rgba(255,255,255,0.05);border:none;color:white;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:12px}
.add{padding:14px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.15);margin-bottom:10px;max-width:600px;margin-left:auto;margin-right:auto}
.add input{width:100%;padding:10px;border-radius:8px;background:rgba(0,0,0,0.4);color:white;border:1px solid rgba(255,255,255,0.1);font-size:14px}
.add input:focus{outline:none;border-color:#8b5cf6}
.add button{padding:8px 16px;border-radius:8px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;margin-top:6px;width:100%}
</style>
</head>
<body>
<h1>📋 Kanban</h1>
<p class="sub" id="sub">Vazifalaringizni boshqaring</p>
<div class="tabs" id="tabs"></div>
<div class="add">
  <input id="ni" placeholder="Yangi kartochka..." maxlength="200" onkeypress="if(event.key==='Enter')add()">
  <button onclick="add()">+ Qo'shish</button>
</div>
<div class="cards" id="cards"></div>
<script>
var statuses=[{k:'todo',n:'📋 Qilish kerak',c:'todo'},{k:'doing',n:'⚡ Jarayonda',c:'doing'},{k:'done',n:'✅ Tugatildi',c:'done'}];
var data=oo.load('kanban',{todo:[{t:'00o.uz saytini yaxshilash',d:'2026-07-20'},{t:'Yangi funksiyalar qo\'shish',d:'2026-07-25'}],doing:[{t:'Mobil versiyani tekshirish',d:'2026-07-15'}],done:[{t:'Bosh sahifa yaratildi',d:'2026-07-14'}]});
var cur='todo';
function save(){ oo.save('kanban',data); }
function renderTabs(){
  document.getElementById('tabs').innerHTML=statuses.map(function(s){
    return '<div class="tab '+(cur===s.k?'act':'')+'" onclick="setS(\''+s.k+'\',this)">'+s.n+' <span style="opacity:0.6">('+(data[s.k]||[]).length+')</span></div>';
  }).join('');
}
function setS(k,el){ cur=k; renderTabs(); render(); }
function render(){
  var list=data[cur]||[];
  var total=Object.values(data).reduce(function(s,a){return s+a.length;},0);
  document.getElementById('sub').textContent=total+' ta kartochka · '+(data.todo||[]).length+' kutilmoqda';
  document.getElementById('cards').innerHTML=list.length?list.map(function(c,i){
    return '<div class="card '+statuses.find(function(s){return s.k===cur;}).c+'"><div class="card-text">'+escape(c.t)+'</div><div class="card-meta"><span>📅 '+c.d+'</span><div class="card-actions">'+nav(i)+'<button class="cb" onclick="del('+i+')" style="background:rgba(239,68,68,0.2)">×</button></div></div></div>';
  }).join(''):'<div style="text-align:center;color:#64748b;padding:30px">Bo\'sh. Yangi qo\'shing!</div>';
}
function nav(i){
  var idx=statuses.findIndex(function(s){return s.k===cur;});
  var h='';
  if(idx>0) h+='<button class="cb" onclick="mv('+i+',-1)">←</button>';
  if(idx<statuses.length-1) h+='<button class="cb" onclick="mv('+i+',1)">→</button>';
  return h;
}
function escape(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function add(){
  var v=document.getElementById('ni').value.trim();
  if(!v) return;
  data[cur]=data[cur]||[];
  data[cur].unshift({t:v,d:new Date().toISOString().slice(0,10)});
  document.getElementById('ni').value='';
  save(); renderTabs(); render();
  toast.success('Qo\'shildi');
}
function mv(i,dir){
  var idx=statuses.findIndex(function(s){return s.k===cur;});
  var nk=statuses[idx+dir].k;
  if(!data[nk]) data[nk]=[];
  data[nk].unshift(data[cur].splice(i,1)[0]);
  cur=nk; save(); renderTabs(); render();
}
function del(i){
  data[cur].splice(i,1);
  save(); renderTabs(); render();
}
renderTabs(); render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<title>JSON — 00o.uz</title>
<script src="/global.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;padding:60px 16px 100px;max-width:720px;margin:0 auto}
h1{font-size:clamp(24px,6vw,32px);font-weight:800;text-align:center;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:20px}
.bar{padding:16px;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
label{display:block;font-size:13px;color:#cbd5e1;margin-bottom:6px}
textarea{width:100%;padding:12px;border-radius:10px;background:rgba(0,0,0,0.4);color:white;border:1px solid rgba(255,255,255,0.1);font-size:13px;font-family:ui-monospace,monospace;resize:vertical;min-height:200px;line-height:1.5}
textarea:focus{outline:none;border-color:#8b5cf6}
button{padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;border:none;font-weight:700;cursor:pointer;font-size:14px;flex:1}
button.s{background:rgba(255,255,255,0.05)}
.row{display:flex;gap:6px;margin-top:8px}
.status{padding:10px 12px;border-radius:8px;margin-top:8px;font-size:13px;text-align:center}
.ok{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.3)}
.err{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);word-break:break-word}
.tabs{display:flex;gap:4px;margin-bottom:8px;background:rgba(255,255,255,0.03);padding:4px;border-radius:10px}
.tab{flex:1;padding:8px;border-radius:8px;text-align:center;cursor:pointer;font-size:12px;color:#94a3b8}
.tab.act{background:linear-gradient(135deg,#8b5cf6,#ec4899);color:white;font-weight:700}
</style>
</head>
<body>
<h1>{} JSON Tools</h1>
<p class="sub">Formatlash, tekshirish, konvertatsiya</p>
<div class="bar">
  <div class="tabs">
    <div class="tab act" onclick="setT('fmt',this)">Formatlash</div>
    <div class="tab" onclick="setT('min',this)">Minify</div>
    <div class="tab" onclick="setT('val',this)">Tekshirish</div>
    <div class="tab" onclick="setT('csv',this)">JSON→CSV</div>
  </div>
  <label>JSON kiriting:</label>
  <textarea id="in" oninput="proc()">{"name":"00o.uz","version":"2.0","features":["todo","notes","qr","password"],"stats":{"users":50000,"apps":50,"languages":["uz","en","ru"]}}</textarea>
  <div class="row">
    <button class="s" onclick="cp()">📋 Nusxa</button>
    <button class="s" onclick="clr()">🗑 Tozalash</button>
    <button onclick="proc()">▶️ Bajarish</button>
  </div>
  <label style="margin-top:12px">Natija:</label>
  <textarea id="out" readonly></textarea>
  <div id="st"></div>
</div>
<script>
var type='fmt';
function setT(t,el){ type=t; document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act');}); el.classList.add('act'); proc(); }
function escape(s){ return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
function proc(){
  var v=document.getElementById('in').value.trim();
  var st=document.getElementById('st');
  if(!v){ document.getElementById('out').value=''; st.innerHTML=''; return; }
  try {
    var obj=JSON.parse(v);
    if(type==='fmt'){ document.getElementById('out').value=JSON.stringify(obj,null,2); st.innerHTML='<div class="status ok">✅ To\'g\'ri formatlandi · '+Object.keys(obj).length+' ta kalit</div>'; }
    else if(type==='min'){ document.getElementById('out').value=JSON.stringify(obj); st.innerHTML='<div class="status ok">✅ Minify: '+v.length+' → '+JSON.stringify(obj).length+' belgi</div>'; }
    else if(type==='val'){ st.innerHTML='<div class="status ok">✅ Yaroqli JSON</div>'; document.getElementById('out').value=JSON.stringify(obj,null,2); }
    else if(type==='csv'){
      if(!Array.isArray(obj)||!obj.length||typeof obj[0]!=='object') throw new Error('Massiv kerak');
      var keys=Object.keys(obj[0]);
      var csv=keys.join(',')+'\n'+obj.map(function(r){return keys.map(function(k){var v=r[k];if(v===null||v===undefined)return'';if(typeof v==='string')return '"'+v.replace(/"/g,'""')+'"';if(typeof v==='object')return JSON.stringify(v);return v;}).join(',');}).join('\n');
      document.getElementById('out').value=csv; st.innerHTML='<div class="status ok">✅ '+obj.length+' qatorga konvertatsiya</div>';
    }
  } catch(e){ document.getElementById('out').value=''; st.innerHTML='<div class="status err">❌ Xato: '+escape(e.message)+'</div>'; }
}
function cp(){ var v=document.getElementById('out').value; if(!v)return; try{navigator.clipboard.writeText(v);toast.success('Nusxalandi!');}catch(e){} }
function clr(){ document.getElementById('in').value=''; document.getElementById('out').value=''; document.getElementById('st').innerHTML=''; }
proc();
</script>
</body>
</html>

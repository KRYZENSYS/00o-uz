<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirish — 00o.uz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1e1b4b 50%, #0a0e1a 100%);
  color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px; position: relative; overflow: hidden; }
body::before { content: ''; position: absolute; top: 20%; left: 30%; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(139,92,246,0.3), transparent 70%); filter: blur(80px); }
body::after { content: ''; position: absolute; bottom: 20%; right: 30%; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(6,182,212,0.3), transparent 70%); filter: blur(80px); }
.auth-box { width: 420px; max-width: 100%; padding: 40px; border-radius: 24px;
  background: rgba(15,23,42,0.7); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 1;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.auth-logo { text-align: center; font-size: 32px; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #8b5cf6, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.auth-sub { text-align: center; color: #94a3b8; margin-bottom: 30px; }
.tabs { display: flex; gap: 4px; padding: 4px; background: rgba(255,255,255,0.05);
  border-radius: 12px; margin-bottom: 24px; }
.tab { flex: 1; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 600; }
.tab.active { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
.field { margin-bottom: 16px; }
.label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.input { width: 100%; padding: 12px 16px; border-radius: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: white; font-size: 14px; transition: 0.2s; }
.input:focus { outline: none; border-color: #8b5cf6; background: rgba(255,255,255,0.08); }
.btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white;
  font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 8px;
  box-shadow: 0 10px 30px rgba(139,92,246,0.4); transition: 0.2s; }
.btn-main:hover { transform: translateY(-2px); }
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #64748b; font-size: 12px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
.oauth { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.oauth-btn { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 22px;
  display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.oauth-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
.check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
.link { color: #8b5cf6; text-decoration: none; font-size: 13px; }
.link:hover { text-decoration: underline; }
.bottom-link { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 13px; }
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">00o.uz</div>
  <div class="auth-sub">O'zbekistondagi eng katta platforma</div>
  <div class="tabs">
    <div class="tab active" onclick="setTab(this, 'login')">Kirish</div>
    <div class="tab" onclick="setTab(this, 'signup')">Ro'yxat</div>
  </div>
  <div class="field"><label class="label">Email yoki telefon</label><input class="input" placeholder="email@00o.uz" value="demo@00o.uz"></div>
  <div class="field"><label class="label">Parol</label><input class="input" type="password" placeholder="••••••••" value="123456"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div class="check"><input type="checkbox" checked> Eslab qol</div>
    <a href="#" class="link">Parolni unutdingizmi?</a>
  </div>
  <button class="btn-main" onclick="login()">Kirish →</button>
  <div class="divider">yoki davom eting</div>
  <div class="oauth">
    <button class="oauth-btn" title="Google">🔵</button>
    <button class="oauth-btn" title="Telegram">✈️</button>
    <button class="oauth-btn" title="GitHub">🐙</button>
  </div>
  <div class="bottom-link">Hisobingiz yo'qmi? <a href="#" class="link">Ro'yxatdan o'ting</a></div>
</div>
<script src="/toast.js"></script>
<script src="/confetti.js"></script>
<script src="/sound-effects.js"></script>
<script>
function setTab(el, t) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  document.querySelector('.auth-sub').textContent = t === 'login' ? 'Hisobingizga kiring' : 'Yangi hisob yarating';
  document.querySelector('.btn-main').textContent = t === 'login' ? 'Kirish →' : 'Ro\'yxatdan o\'tish →';
}
function login() {
  window.sfx?.success();
  window.confetti({count:100, x: window.innerWidth/2, y: window.innerHeight/2});
  setTimeout(() => {
    window.toast?.success('Xush kelibsiz! Demo rejimida kirdingiz', '👋');
    setTimeout(() => location.href = 'dashboard.html', 800);
  }, 400);
}
</script>
</body>
</html>

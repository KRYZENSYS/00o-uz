version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-00o_uz}
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes: [redis_data:/data]
    ports: ["6379:6379"]
    command: redis-server --appendonly yes

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-00o_uz}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  bot:
    build: { context: ./backend, dockerfile: Dockerfile }
    restart: always
    depends_on: [backend]
    environment:
      API_URL: http://backend:8000
      WEBAPP_URL: ${WEBAPP_URL:-https://00o.uz}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    command: python bot/main.py

  worker:
    build: { context: ./backend, dockerfile: Dockerfile }
    restart: always
    depends_on: [redis, postgres]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-00o_uz}
      REDIS_URL: redis://redis:6379
    command: celery -A app.workers.celery_app worker --loglevel=info

  frontend:
    build: { context: ., dockerfile: Dockerfile.frontend }
    restart: always
    depends_on: [backend]
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports: ["3000:3000"]

  nginx:
    image: nginx:alpine
    restart: always
    depends_on: [frontend, backend]
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  redis_data:
